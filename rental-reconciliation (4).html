// ── Bank Reconciliation ──────────────────────────────────────────────────────

// ── PDF bank statement parser ─────────────────────────────────────────────────
const parseBankPDF = async file => {
  if(!window.pdfjsLib) throw new Error('PDF library not loaded yet — please wait a moment and try again');
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data: arrayBuffer}).promise;
  
  // Extract all text with positions from every page
  let allLines = [];
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    // Group items into lines by Y position (within 3pt tolerance)
    const lineMap = {};
    for(const item of tc.items){
      const y = Math.round(item.transform[5]/3)*3;
      if(!lineMap[y]) lineMap[y]=[];
      lineMap[y].push({x:item.transform[4], text:item.str.trim()});
    }
    // Sort each line by X, join, add to allLines
    const sorted = Object.entries(lineMap).sort(([a],[b])=>Number(b)-Number(a));
    for(const [,items] of sorted){
      const line = items.sort((a,b)=>a.x-b.x).map(i=>i.text).join(' ').trim();
      if(line) allLines.push(line);
    }
  }

  // ── Parse lines into transactions ──────────────────────────────────────────
  // Date patterns: MM/DD/YYYY, MM/DD/YY, DD-Mon-YYYY, YYYY-MM-DD, Mon DD YYYY
  const dateRe = /(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|\d{4}[\/\-]\d{2}[\/\-]\d{2}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2},?\s+\d{4})/i;
  // Amount patterns: $1,234.56  or  1,234.56  or  (1,234.56) for negatives
  const amtRe = /\(?\$?\s*(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)\)?/g;
  
  const parseDate = s => {
    if(!s) return null;
    const d = new Date(s.replace(/-/g,'/'));
    if(!isNaN(d)) return d.toISOString().split('T')[0];
    return null;
  };

  const txns = [];
  let idx = 0;

  for(const line of allLines){
    const dateMatch = line.match(dateRe);
    if(!dateMatch) continue;
    
    const date = parseDate(dateMatch[0]);
    if(!date) continue;

    // Find all amounts on this line
    const amounts = [];
    let m;
    const reClone = new RegExp(amtRe.source, 'g');
    while((m=reClone.exec(line))!==null){
      const raw = m[0];
      const val = parseFloat(m[1].replace(/,/g,''));
      const isNeg = raw.startsWith('(') || raw.includes('-');
      if(val>0) amounts.push(isNeg?-val:val);
    }
    if(!amounts.length) continue;

    // Description = everything between the date and the first amount
    const dateEnd = line.indexOf(dateMatch[0])+dateMatch[0].length;
    const firstAmtIdx = line.search(/[\$\(]?\d{1,3}(?:,\d{3})*\.\d{2}/);
    let desc = (firstAmtIdx>dateEnd ? line.slice(dateEnd,firstAmtIdx) : line.slice(dateEnd)).trim();
    if(!desc) desc = line.replace(dateMatch[0],'').replace(/[\$\d,.\(\)]+/g,'').trim();
    desc = desc.replace(/\s+/g,' ').trim() || 'Transaction';

    // If multiple amounts: last one is usually the balance, first is the transaction
    // Credits are positive, debits negative — take the non-balance amount
    const amount = amounts.length>=2 ? amounts[0] : amounts[0];
    if(amount===0) continue;

    txns.push({id:'bank-'+idx++, date, description:desc, amount,
      type:amount>=0?'credit':'debit', matched:false, matchedTo:null, matchNote:''});
  }

  if(!txns.length) throw new Error('Could not extract transactions from PDF. Try exporting as CSV from your bank instead.');
  // Deduplicate exact matches (same date+desc+amount)
  const seen = new Set();
  return txns.filter(t=>{
    const key = t.date+'|'+t.description+'|'+t.amount;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
};

const parseBankFile = file => new Promise((resolve,reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{defval:null});
      if(!rows.length) throw new Error('No rows found');

      // Auto-detect columns — look for date, description/memo, amount/credit/debit
      const keys = Object.keys(rows[0]).map(k=>k.trim());
      const find = (...terms) => keys.find(k=>terms.some(t=>k.toLowerCase().includes(t)))||null;

      const dateCol   = find('date','posted','transaction date','trans date');
      const descCol   = find('description','memo','narrative','details','payee','note');
      const amtCol    = find('amount','credit','deposit','debit');
      const creditCol = find('credit','deposit','received');
      const debitCol  = find('debit','withdrawal','charge');

      const txns = rows.map((r,i)=>{
        const rawDate = r[dateCol];
        let date = null;
        if(rawDate instanceof Date) date = rawDate.toISOString().split('T')[0];
        else if(rawDate) date = String(rawDate);

        let amount = 0;
        if(amtCol && r[amtCol]!=null) {
          amount = parseFloat(String(r[amtCol]).replace(/[$,\s]/g,''))||0;
        } else if(creditCol || debitCol) {
          const credit = parseFloat(String(r[creditCol]||'0').replace(/[$,\s]/g,''))||0;
          const debit  = parseFloat(String(r[debitCol] ||'0').replace(/[$,\s]/g,''))||0;
          amount = credit - debit;
        }

        const desc = String(r[descCol]||'').trim();
        return {id:'bank-'+i, date, description:desc, amount,
          type: amount>=0?'credit':'debit', matched:false, matchedTo:null};
      }).filter(t=>t.date&&t.amount!==0);

      resolve(txns);
    } catch(err){reject(err);}
  };
  reader.readAsArrayBuffer(file);
});

// ── Transaction category classifier ─────────────────────────────────────────
const classifyTxn = (desc, amount) => {
  const d = normStr(desc);
  if(amount > 0) {
    if(d.includes('sugar pine')||d.includes('sugarpine')||d.includes('prop mgmt')||d.includes('property mgmt')) return {cat:'Rental Payout',color:'#2d7a4f',bg:'#e6f7ee'};
    if(d.includes('zelle')||d.includes('venmo')||d.includes('paypal')||d.includes('transfer')) return {cat:'Transfer In',color:'#2a5fc4',bg:'#e8eeff'};
    if(d.includes('refund')||d.includes('return')||d.includes('reimb')) return {cat:'Refund',color:'#0d7d6b',bg:'#e4f5f2'};
    if(d.includes('interest')||d.includes('dividend')||d.includes('yield')) return {cat:'Interest',color:'#7c3d8f',bg:'#f3e8ff'};
    return {cat:'Other Income',color:'#3d4463',bg:'#eef0f6'};
  } else {
    if(d.includes('mortgage')||d.includes('loan')||d.includes('mtg')) return {cat:'Mortgage',color:'#b93232',bg:'#fdeaea'};
    if(d.includes('insurance')||d.includes('insur')) return {cat:'Insurance',color:'#c47a0a',bg:'#fef4e0'};
    if(d.includes('utility')||d.includes('electric')||d.includes('water')||d.includes('gas')||d.includes('pg&e')||d.includes('pge')||d.includes('sdge')) return {cat:'Utilities',color:'#1a8a9a',bg:'#e0f5f7'};
    if(d.includes('repair')||d.includes('maintenance')||d.includes('plumb')||d.includes('hvac')||d.includes('handyman')) return {cat:'Maintenance',color:'#b93232',bg:'#fdeaea'};
    if(d.includes('landscap')||d.includes('lawn')||d.includes('garden')||d.includes('weed')) return {cat:'Landscaping',color:'#2d7a4f',bg:'#e6f7ee'};
    if(d.includes('clean')||d.includes('linen')||d.includes('laundry')) return {cat:'Cleaning',color:'#2a5fc4',bg:'#e8eeff'};
    if(d.includes('supply')||d.includes('supplies')||d.includes('amazon')||d.includes('home depot')||d.includes('lowes')) return {cat:'Supplies',color:'#7c3d8f',bg:'#f3e8ff'};
    if(d.includes('management fee')||d.includes('mgmt fee')||d.includes('sugar pine')||d.includes('commission')) return {cat:'PM Fee',color:'#c47a0a',bg:'#fef4e0'};
    if(d.includes('tax')||d.includes('irs')||d.includes('state tax')) return {cat:'Taxes',color:'#3d4463',bg:'#eef0f6'};
    if(d.includes('transfer')||d.includes('zelle out')||d.includes('withdrawal')) return {cat:'Transfer Out',color:'#6b7494',bg:'#eef0f6'};
    return {cat:'Other Expense',color:'#6b7494',bg:'#eef0f6'};
  }
};

const BankPage = ({bankTxns,setBankTxns,statements,reservations}) => {
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null);
  const [filter,setFilter]=useState('all');
  const [reconciled,setReconciled]=useState(false);
  const [selected,setSelected]=useState(new Set()); // selected for reconciliation
  const [editingCat,setEditingCat]=useState(null); // id of txn being edited

  const handleUpload = async files => {
    setLoading(true);
    try {
      let allTxns = [...bankTxns]; // start from existing transactions
      let loaded = 0, errors = 0, fileNames = [];
      for(const file of files){
        try {
          const isPDF = file.name.toLowerCase().endsWith('.pdf') || file.type==='application/pdf';
          const txns = isPDF ? await parseBankPDF(file) : await parseBankFile(file);
          // Deduplicate against already-loaded transactions
          const existing = new Set(allTxns.map(t=>t.date+'|'+t.description+'|'+t.amount));
          const fresh = txns.filter(t=>!existing.has(t.date+'|'+t.description+'|'+t.amount));
          const classified = fresh.map(t=>({...t,...classifyTxn(t.description,t.amount),overrideCat:null}));
          allTxns = [...allTxns,...classified];
          loaded += fresh.length;
          fileNames.push(file.name.replace(/\.[^.]+$/,''));
        } catch(e){ errors++; console.error(file.name, e); }
      }
      // Sort all transactions by date
      allTxns.sort((a,b)=>new Date(b.date)-new Date(a.date));
      // Re-index IDs
      allTxns = allTxns.map((t,i)=>({...t,id:'bank-'+i}));
      setBankTxns(allTxns);
      setReconciled(false);
      setSelected(new Set());
      const msg = loaded>0
        ? 'Added '+loaded+' new transactions from '+fileNames.join(', ')+(errors>0?' ('+errors+' file'+(errors>1?'s':'')+' failed)':'')
        : errors>0 ? errors+' file'+(errors>1?'s':'')+' failed to parse' : 'No new transactions found (already loaded)';
      setMsg({type:loaded>0?'success':'error',text:msg});
    } catch(e){setMsg({type:'error',text:'Failed: '+e.message});}
    setLoading(false);
  };

  const runReconciliation = () => {
    // Build expected payouts from statements
    const stmtPayouts = Object.values(statements).filter(Boolean)
      .filter(s=>s.ownerPayout>0)
      .map(s=>({amount:s.ownerPayout, period:s.period||'', month:s.month, used:false}))
      .sort((a,b)=>a.month-b.month);

    // Work only on selected transactions (or all if none selected)
    const toMatch = selected.size>0
      ? bankTxns.filter(t=>selected.has(t.id))
      : bankTxns;

    const updated = bankTxns.map(t=>({...t, matched:false, matchedTo:null, matchNote:'',
      includeInRecon: selected.size>0 ? selected.has(t.id) : true}));

    for(const txn of updated){
      if(!txn.includeInRecon || txn.amount<=0) continue;
      for(const payout of stmtPayouts){
        if(payout.used) continue;
        if(Math.abs(txn.amount - payout.amount) < 1.01){
          txn.matched = true;
          txn.matchedTo = payout.period || MONTH_FULL[(payout.month||1)-1];
          txn.matchNote = 'Expected: '+fmt$(payout.amount);
          payout.used = true;
          break;
        }
      }
    }

    setBankTxns(updated);
    setReconciled(true);
    const matchedCount = updated.filter(t=>t.matched).length;
    const selectedCredits = updated.filter(t=>t.includeInRecon&&t.amount>0).length;
    setMsg({type:'success',text:'Reconciled: '+matchedCount+'/'+selectedCredits+' selected deposits matched to owner payouts'});
  };

  const toggleSelect = id => setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const selectAll  = () => setSelected(new Set(filtered.map(t=>t.id)));
  const clearSel   = () => setSelected(new Set());
  const selectRentalPayouts = () => setSelected(new Set(bankTxns.filter(t=>t.cat==='Rental Payout'||t.amount>0).map(t=>t.id)));

  const setCat = (id, cat) => {
    setBankTxns(prev=>prev.map(t=>t.id===id?{...t,overrideCat:cat,cat:cat}:t));
    setEditingCat(null);
  };

  const CAT_OPTIONS_CREDIT = ['Rental Payout','Transfer In','Refund','Interest','Other Income'];
  const CAT_OPTIONS_DEBIT  = ['Mortgage','Insurance','Utilities','Maintenance','Landscaping','Cleaning','Supplies','PM Fee','Taxes','Transfer Out','Other Expense'];

  const credits      = useMemo(()=>bankTxns.filter(t=>t.amount>0),[bankTxns]);
  const debits       = useMemo(()=>bankTxns.filter(t=>t.amount<0),[bankTxns]);
  const matched      = useMemo(()=>bankTxns.filter(t=>t.matched),[bankTxns]);
  const rentalDeps   = useMemo(()=>bankTxns.filter(t=>t.cat==='Rental Payout'),[bankTxns]);
  const totalIn      = credits.reduce((s,t)=>s+t.amount,0);
  const totalOut     = debits.reduce((s,t)=>s+Math.abs(t.amount),0);
  const stmtTotal    = Object.values(statements).filter(Boolean).reduce((s,m)=>s+(m.ownerPayout||0),0);
  const matchedTotal = matched.reduce((s,t)=>s+t.amount,0);
  const selectedTotal= [...selected].reduce((s,id)=>{const t=bankTxns.find(x=>x.id===id);return s+(t?.amount||0);},0);

  const catCounts = useMemo(()=>{
    const m={};
    bankTxns.forEach(t=>{m[t.cat]=(m[t.cat]||0)+1;});
    return m;
  },[bankTxns]);

  const filtered = useMemo(()=>{
    if(filter==='credits')        return bankTxns.filter(t=>t.amount>0);
    if(filter==='debits')         return bankTxns.filter(t=>t.amount<0);
    if(filter==='matched')        return bankTxns.filter(t=>t.matched);
    if(filter==='unmatched')      return bankTxns.filter(t=>!t.matched&&t.amount>0);
    if(filter==='rental')         return bankTxns.filter(t=>t.cat==='Rental Payout');
    if(filter==='selected')       return bankTxns.filter(t=>selected.has(t.id));
    return bankTxns;
  },[bankTxns,filter,selected]);

  const allFilteredSelected = filtered.length>0 && filtered.every(t=>selected.has(t.id));

  if(!bankTxns.length) return h('div',null,
    h(SectionHeader,{title:'Bank Reconciliation',sub:'Upload your bank statement — transactions are auto-categorized and matched to owner payouts'}),
    h(DropZone,{onFiles:handleUpload,multiple:true,
      accept:'.xlsx,.csv,.pdf,application/pdf',
      label:'Drop bank statement files here',
      sublabel:'CSV, Excel or PDF · Upload multiple months at once · Auto-deduplicated & categorized'}),
    loading&&h('div',{style:{textAlign:'center',padding:24,color:T.textSub,fontFamily:font,
      display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
      h('div',{style:{width:16,height:16,border:'2px solid '+T.border,borderTopColor:T.blue,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
      'Analyzing transactions…'),
    h(AlertBanner,{msg,onClose:()=>setMsg(null)}));

  return h('div',null,
    h(SectionHeader,{title:'Bank Reconciliation',
      sub:bankTxns.length+' transactions · '+fmt$(totalIn)+' in · '+fmt$(totalOut)+' out',
      actions:h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        selected.size>0&&h('span',{style:{fontSize:12,color:T.textSub,fontFamily:font}},selected.size+' selected ('+fmt$(Math.abs(selectedTotal))+')'),
        h(Btn,{variant:'secondary',size:'sm',icon:'upload',onClick:()=>{setBankTxns([]);setReconciled(false);setSelected(new Set());setMsg(null);}},'Replace File'),
        h('button',{onClick:runReconciliation,style:{
          padding:'7px 16px',borderRadius:7,fontFamily:font,fontSize:12,fontWeight:600,cursor:'pointer',
          display:'inline-flex',alignItems:'center',gap:6,border:'1px solid '+T.navy,
          background:T.navy,color:T.white}},
          h(Icon,{d:IC.refresh,size:13,color:'currentColor'}),
          selected.size>0?'Reconcile Selected ('+selected.size+')':'Run Reconciliation'))}),
    h(AlertBanner,{msg,onClose:()=>setMsg(null)}),

    // ── KPI cards ─────────────────────────────────────────────────────────
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:16}},
      h(StatCard,{label:'Transactions',value:bankTxns.length,icon:IC.list,accent:T.navy}),
      h(StatCard,{label:'Total In',value:fmt$(totalIn),icon:IC.dollar,accent:T.green}),
      h(StatCard,{label:'Total Out',value:fmt$(totalOut),icon:IC.alert,accent:T.red}),
      h(StatCard,{label:'Rental Deposits',value:rentalDeps.length,icon:IC.home,accent:T.teal,
        sub:fmt$(rentalDeps.reduce((s,t)=>s+t.amount,0))}),
      h(StatCard,{label:'Expected Payouts',value:fmt$(stmtTotal),icon:IC.chart,accent:T.blue}),
      h(StatCard,{label:'Matched',value:reconciled?matched.length+'/'+credits.length:'—',
        icon:IC.check,accent:T.green,
        sub:reconciled?fmt$(matchedTotal):null})),

    // ── Variance / success banner ─────────────────────────────────────────
    reconciled&&stmtTotal>0&&h('div',{style:{padding:'11px 16px',borderRadius:8,marginBottom:14,
      display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,
      background:Math.abs(matchedTotal-stmtTotal)<1?T.greenLight:T.amberLight,
      border:'1px solid '+(Math.abs(matchedTotal-stmtTotal)<1?T.green+'50':T.amber+'50')}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h(Icon,{d:Math.abs(matchedTotal-stmtTotal)<1?IC.check:IC.alert,size:14,
          color:Math.abs(matchedTotal-stmtTotal)<1?T.green:T.amber}),
        h('span',{style:{fontSize:13,fontWeight:600,fontFamily:font,
          color:Math.abs(matchedTotal-stmtTotal)<1?T.green:T.amber}},
          Math.abs(matchedTotal-stmtTotal)<1
            ?'All payouts reconciled — bank matches statements'
            :'Variance of '+fmt$(Math.abs(matchedTotal-stmtTotal))+' between matched deposits and expected payouts')),
      h('span',{style:{fontSize:12,color:T.textSub,fontFamily:font}},
        'Matched: '+fmt$(matchedTotal)+' · Expected: '+fmt$(stmtTotal))),

    // ── Category summary chips ─────────────────────────────────────────────
    h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}},
      Object.entries(catCounts).sort(([,a],[,b])=>b-a).map(([cat,count])=>{
        const ex = bankTxns.find(t=>t.cat===cat);
        return h('button',{key:cat,
          onClick:()=>setFilter(filter===cat?'all':cat),
          style:{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',
            border:'1px solid '+(filter===cat?ex?.color||T.navy:T.border),
            background:filter===cat?(ex?.bg||T.blueLight):T.white,
            color:filter===cat?(ex?.color||T.navy):T.textSub,fontFamily:font,
            display:'inline-flex',alignItems:'center',gap:5}},
          cat,' ',
          h('span',{style:{fontSize:10,opacity:0.8}},'('+count+')'));
      })),

    // ── Add more files zone (compact) ────────────────────────────────────
    h('div',{style:{marginBottom:14}},
      h('label',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',
        borderRadius:8,border:'2px dashed '+T.border,cursor:'pointer',
        background:T.gray0,transition:'all 0.15s',fontFamily:font}},
        h('input',{type:'file',multiple:true,accept:'.xlsx,.csv,.pdf,application/pdf',
          style:{display:'none'},onChange:e=>e.target.files.length&&handleUpload(Array.from(e.target.files))}),
        h('div',{style:{width:28,height:28,borderRadius:6,background:T.blueLight,flexShrink:0,
          display:'flex',alignItems:'center',justifyContent:'center'}},
          h(Icon,{d:IC.upload,size:14,color:T.blue})),
        h('div',null,
          h('div',{style:{fontSize:12,fontWeight:600,color:T.text}},'Add more files'),
          h('div',{style:{fontSize:11,color:T.textSub}},'CSV, Excel or PDF — new transactions merged & deduplicated automatically')))),
    // ── Filter + Select toolbar ───────────────────────────────────────────
    h('div',{style:{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap',alignItems:'center'}},
      // Filter pills
      [{id:'all',label:'All ('+bankTxns.length+')'},{id:'credits',label:'Credits ('+credits.length+')'},
       {id:'debits',label:'Debits ('+debits.length+')'},{id:'rental',label:'Rental Deposits ('+rentalDeps.length+')'},
       {id:'matched',label:'Matched ('+matched.length+')'},{id:'selected',label:'Selected ('+selected.size+')'}]
      .map(f=>h('button',{key:f.id,onClick:()=>setFilter(f.id),style:{
        padding:'5px 12px',borderRadius:6,fontSize:11,fontFamily:font,fontWeight:500,cursor:'pointer',
        border:'1px solid '+(filter===f.id?T.navy:T.border),
        background:filter===f.id?T.navy:T.white,color:filter===f.id?T.white:T.textSub}},f.label)),
      h('div',{style:{marginLeft:'auto',display:'flex',gap:6}}),
      // Quick-select helpers
      h('div',{style:{width:1,height:20,background:T.border}}),
      h('button',{onClick:allFilteredSelected?clearSel:selectAll,style:{
        padding:'5px 12px',borderRadius:6,fontSize:11,fontFamily:font,fontWeight:500,cursor:'pointer',
        border:'1px solid '+T.border,background:T.white,color:T.textSub}},
        allFilteredSelected?'Deselect All':'Select All Visible'),
      h('button',{onClick:selectRentalPayouts,style:{
        padding:'5px 12px',borderRadius:6,fontSize:11,fontFamily:font,fontWeight:500,cursor:'pointer',
        border:'1px solid '+T.teal+'60',background:T.tealLight,color:T.teal}},
        'Select Rental Deposits'),
      selected.size>0&&h('button',{onClick:clearSel,style:{
        padding:'5px 12px',borderRadius:6,fontSize:11,fontFamily:font,fontWeight:500,cursor:'pointer',
        border:'1px solid '+T.red+'40',background:T.redLight,color:T.red}},
        'Clear Selection')),

    // ── Transaction table with selection + category editing ───────────────
    h('div',{style:{overflowX:'auto',borderRadius:8,border:'1px solid '+T.border}},
      h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:font}},
        h('thead',null,
          h('tr',{style:{background:T.gray0,borderBottom:'1px solid '+T.border}},
            h('th',{style:{padding:'10px 12px',width:36,textAlign:'center'}},
              h('input',{type:'checkbox',checked:allFilteredSelected,
                onChange:()=>allFilteredSelected?clearSel():selectAll(),
                style:{cursor:'pointer',accentColor:T.navy}})),
            ['Date','Description','Category','Amount','Type','Status','Matched To'].map(hd=>
              h('th',{key:hd,style:{padding:'10px 12px',textAlign:hd==='Amount'?'right':'left',
                fontWeight:600,color:T.textSub,whiteSpace:'nowrap',borderRight:'1px solid '+T.border}},hd)))),
        h('tbody',null,
          filtered.map((txn,i)=>{
            const isSel = selected.has(txn.id);
            const isEditing = editingCat===txn.id;
            const cats = txn.amount>=0 ? CAT_OPTIONS_CREDIT : CAT_OPTIONS_DEBIT;
            return h('tr',{key:txn.id,style:{
              background:isSel?T.blueLight:i%2===0?T.white:T.gray0,
              borderBottom:'1px solid '+T.border,transition:'background 0.1s'}},
              // Checkbox
              h('td',{style:{padding:'8px 12px',textAlign:'center'}},
                h('input',{type:'checkbox',checked:isSel,
                  onChange:()=>toggleSelect(txn.id),style:{cursor:'pointer',accentColor:T.navy}})),
              // Date
              h('td',{style:{padding:'8px 12px',color:T.textSub,whiteSpace:'nowrap',borderRight:'1px solid '+T.border}},fmtDate(txn.date)),
              // Description
              h('td',{style:{padding:'8px 12px',borderRight:'1px solid '+T.border,maxWidth:260,
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
                h('span',{style:{fontFamily:mono,fontSize:11,color:T.text}},txn.description||'—')),
              // Category (editable)
              h('td',{style:{padding:'8px 12px',borderRight:'1px solid '+T.border,whiteSpace:'nowrap'}},
                isEditing
                  ? h('select',{autoFocus:true,value:txn.cat,
                      onBlur:()=>setEditingCat(null),
                      onChange:e=>setCat(txn.id,e.target.value),
                      style:{fontSize:11,fontFamily:font,border:'1px solid '+T.blue,
                        borderRadius:4,padding:'2px 4px',background:T.white}},
                      cats.map(c=>h('option',{key:c,value:c},c)))
                  : h('span',{onClick:()=>setEditingCat(txn.id),
                      title:'Click to change category',
                      style:{padding:'2px 8px',borderRadius:12,fontSize:11,fontWeight:600,
                        cursor:'pointer',display:'inline-flex',alignItems:'center',gap:4,
                        background:txn.bg||T.gray1,color:txn.color||T.textSub,
                        border:'1px solid transparent',transition:'border 0.1s'}},
                      txn.cat||'Unknown',
                      h('span',{style:{fontSize:9,opacity:0.6}},'✎'))),
              // Amount
              h('td',{style:{padding:'8px 12px',textAlign:'right',fontWeight:700,
                color:txn.amount>=0?T.green:T.red,borderRight:'1px solid '+T.border,whiteSpace:'nowrap'}},
                (txn.amount>=0?'+':'')+fmt$(Math.abs(txn.amount))),
              // Type
              h('td',{style:{padding:'8px 12px',borderRight:'1px solid '+T.border}},
                h(Badge,{label:txn.amount>=0?'Credit':'Debit',
                  color:txn.amount>=0?T.green:T.red,
                  bg:txn.amount>=0?T.greenLight:T.redLight})),
              // Status
              h('td',{style:{padding:'8px 12px',borderRight:'1px solid '+T.border}},
                reconciled
                  ? h(Badge,{label:txn.matched?'Matched':'Unmatched',
                      color:txn.matched?T.green:txn.amount>0?T.amber:T.gray4,
                      bg:txn.matched?T.greenLight:txn.amount>0?T.amberLight:T.gray1})
                  : isSel
                    ? h('span',{style:{fontSize:11,color:T.blue,fontFamily:font,fontWeight:600}},'Selected')
                    : h('span',{style:{fontSize:11,color:T.gray3,fontFamily:font}},'—')),
              // Matched To
              h('td',{style:{padding:'8px 12px',color:T.textSub,fontSize:11,fontFamily:font}},
                txn.matchedTo
                  ? h('div',null,
                      h('div',{style:{fontWeight:600,color:T.teal}},txn.matchedTo),
                      txn.matchNote&&h('div',{style:{fontSize:10,color:T.textSub}},txn.matchNote))
                  : '—'));
          })))));
};

const SETTINGS_KEY = 'rental_recon_settings_v1';
const loadSettings = () => {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
};
const saveSettings = s => {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {}
};

// These are module-level so all components can read them reactively via props/context
// We use a simple approach: read once on load, re-read via App state
let _expCats = null;
let _incCats = null;
const getExpCats = () => {
  if (!_expCats) {
    const s = loadSettings();
    _expCats = (s?.expCategories?.length) ? s.expCategories : [...DEFAULT_EXP_CATEGORIES];
  }
  return _expCats;
};
const getIncCats = () => {
  if (!_incCats) {
    const s = loadSettings();
    _incCats = (s?.incCategories?.length) ? s.incCategories : [...DEFAULT_INC_CATEGORIES];
  }
  return _incCats;
};

// Best-match category from description — mapped to user's category list
const bestExpCategory = desc => {
  const d = normStr(desc);

  // ── Mortgage & Financing ──────────────────────────────────────────────────
  if(d.includes('mortgage interest')||d.includes('mortgage int')||d.includes('interest charge')||
     d.includes('interest payment')||d.includes('finance charge')) return 'Mortgage Interest';
  if(d.includes('mortgage')||d.includes('mtg pmt')||d.includes('home loan')) return 'Mortgage Interest';
  if(d.includes('loan financing')||d.includes('loan approval')||d.includes('origination')||
     d.includes('closing cost')||d.includes('escrow fee')) return 'Loan Financing and Approval';
  if(d.includes('credit card interest')||d.includes('interest fee')||d.includes('apr charge')) return 'Credit Card Interests';

  // ── Insurance & Tax ───────────────────────────────────────────────────────
  if(d.includes('hazard insurance')||d.includes('homeowner insurance')||d.includes('property insurance')||
     d.includes('allstate')||d.includes('state farm')||d.includes('farmers insurance')||
     d.includes('liberty mutual')||d.includes('usaa insurance')) return 'Hazard Insurance';
  if(d.includes('home warranty')||d.includes('american home shield')||d.includes('2-10 home')) return 'Home Warranty';
  if(d.includes('real estate tax')||d.includes('real state tax')||d.includes('property tax')||
     d.includes('prop tax')||d.includes('county tax')||d.includes('tax assessor')||
     d.includes('treasurer tax')) return 'Real State Taxes';

  // ── Utilities ─────────────────────────────────────────────────────────────
  if(d.includes('pg&e')||d.includes('pge')||d.includes('sdge')||d.includes('edison')||
     d.includes('electric')||d.includes('power company')) return 'Utilities - Gas';
  if(d.includes('propane')||d.includes('gas company')||d.includes('natural gas')||
     d.includes('gas svc')||d.includes('gas service')) return 'Utilities - Gas';
  if(d.includes('garbage')||d.includes('trash')||d.includes('waste management')||
     d.includes('recycle')||d.includes('rubbish')) return 'Utility - Garbage';
  if(d.includes('internet')||d.includes('wifi')||d.includes('comcast')||d.includes('xfinity')||
     d.includes('att')||d.includes('spectrum')||d.includes('cox')||d.includes('centurylink')||
     d.includes('starlink')) return 'Utility - Internet';
  if(d.includes('cable')||d.includes('dish network')||d.includes('directv')||d.includes('hulu')||
     d.includes('streaming')||d.includes('tv service')) return 'Utility - Media';
  if(d.includes('sewer')||d.includes('water sewer')||d.includes('wastewater')) return 'Utility - Sewer';
  if(d.includes('home inspection')||d.includes('house inspection')||d.includes('property inspection')) return 'Utility - Home Inspection';
  if(d.includes('water')||d.includes('irrigation')||d.includes('water bill')) return 'Utility - Sewer';

  // ── Repairs & Maintenance ─────────────────────────────────────────────────
  if(d.includes('repair')||d.includes('maintenance')||d.includes('handyman')||d.includes('fix')||
     d.includes('plumb')||d.includes('hvac')||d.includes('heating')||d.includes('cooling')||
     d.includes('furnace')||d.includes('air cond')||d.includes('roofing')||d.includes('roof')||
     d.includes('electrician')||d.includes('appliance repair')||d.includes('washer repair')||
     d.includes('dryer repair')) return 'Repairs and Maintenance';

  // ── Supplies ──────────────────────────────────────────────────────────────
  if(d.includes('home depot')||d.includes('lowes')||d.includes('menards')||
     d.includes('ace hardware')||d.includes('true value')||d.includes('do it best')) return 'Supplies and Materials';
  if(d.includes('restocking')||d.includes('restock')) return 'Monthly Restocking Fees';
  if(d.includes('amazon')||d.includes('walmart')||d.includes('target')||d.includes('costco')||
     d.includes('sams club')||d.includes('bjs wholesale')) return 'Supplies';
  if(d.includes('supplies')||d.includes('supply store')||d.includes('cleaning supply')||
     d.includes('janitorial supply')) return 'Supplies';
  if(d.includes('material')||d.includes('lumber')||d.includes('hardware')) return 'Supplies and Materials';

  // ── Furniture & Fixtures ──────────────────────────────────────────────────
  if(d.includes('furniture')||d.includes('ikea')||d.includes('wayfair')||d.includes('ashley')||
     d.includes('rooms to go')||d.includes('pottery barn')||d.includes('west elm')||
     d.includes('fixture')||d.includes('appliance')||d.includes('washer')||d.includes('dryer')||
     d.includes('refriger')||d.includes('dishwash')||d.includes('microwave')) return 'Furniture and Fixtures';

  // ── Property Management ───────────────────────────────────────────────────
  if(d.includes('management fee')||d.includes('mgmt fee')||d.includes('sugar pine')||
     d.includes('property mgmt')||d.includes('prop mgmt')||d.includes('pm fee')) return 'Property Management Fee';

  // ── Cleaning ──────────────────────────────────────────────────────────────
  if(d.includes('clean')||d.includes('maid')||d.includes('housekeep')||d.includes('janitorial')||
     d.includes('linen')||d.includes('laundry')) return 'Supplies'; // cleaning supplies

  // ── Home Purchase / Valuation ─────────────────────────────────────────────
  if(d.includes('appraisal')||d.includes('valuation')||d.includes('home purchase')||
     d.includes('real estate agent')||d.includes('realtor')) return 'Home Purchase - Valuation';

  // ── Legal, Tax & Accounting ───────────────────────────────────────────────
  if(d.includes('attorney')||d.includes('legal')||d.includes('lawyer')||d.includes('law firm')||
     d.includes('accountant')||d.includes('bookkeep')||d.includes('quickbooks')||d.includes('cpa')||
     d.includes('tax prep')||d.includes('tax return')||d.includes('h&r block')||
     d.includes('turbotax')) return 'Legal, Tax and Accounting';

  // ── Business Travel ───────────────────────────────────────────────────────
  if(d.includes('airline')||d.includes('flight')||d.includes('delta')||d.includes('united')||
     d.includes('southwest')||d.includes('american air')||d.includes('jetblue')||
     d.includes('spirit air')||d.includes('airport')) return 'Business Travel - Airfare';
  if(d.includes('hotel')||d.includes('marriott')||d.includes('hilton')||d.includes('hyatt')||
     d.includes('holiday inn')||d.includes('best western')||d.includes('motel')||
     d.includes('airbnb stay')||d.includes('vrbo stay')) return 'Business Travel - Hotels';
  if(d.includes('uber')||d.includes('lyft')||d.includes('taxi')||d.includes('cab')||
     d.includes('rideshare')||d.includes('ride share')) return 'Business Travel - Taxis';
  if(d.includes('restaurant')||d.includes('dining')||d.includes('cafe')||d.includes('coffee')||
     d.includes('doordash')||d.includes('grubhub')||d.includes('ubereats')||
     d.includes('meal')||d.includes('food')) return 'Business Travel - Meals';
  if(d.includes('mileage')||d.includes('mileiq')) return 'Business Travel - Mileage';

  // ── Vehicle & Gas ─────────────────────────────────────────────────────────
  if(d.includes('gas station')||d.includes('shell')||d.includes('chevron')||d.includes('arco')||
     d.includes('76 gas')||d.includes('exxon')||d.includes('mobil')||d.includes('bp gas')||
     d.includes('speedway')||d.includes('circle k')||d.includes('pilot travel')||
     d.includes('truck stop')||d.includes('fuel')||d.includes('gasoline')||
     d.includes('vehicle gas')||d.includes('auto fuel')) return 'Vehicle gas & fuel';
  if(d.includes('travel')||d.includes('trip')) return 'Business Travel - Gas';

  // ── Advertisement & Marketing ─────────────────────────────────────────────
  if(d.includes('advertis')||d.includes('marketing')||d.includes('promotion')||d.includes('seo')||
     d.includes('google ads')||d.includes('facebook ads')||d.includes('meta ads')||
     d.includes('airbnb fee')||d.includes('vrbo fee')||d.includes('booking.com')||
     d.includes('listing fee')) return 'Advertisement and Promotion';

  // ── Communications ────────────────────────────────────────────────────────
  if(d.includes('phone')||d.includes('mobile')||d.includes('verizon')||d.includes('t-mobile')||
     d.includes('at&t wireless')||d.includes('sprint')||d.includes('communication')||
     d.includes('postal')||d.includes('fedex')||d.includes('ups shipping')||
     d.includes('usps')) return 'Communications';

  // ── Bank & Finance ────────────────────────────────────────────────────────
  if(d.includes('bank fee')||d.includes('service fee')||d.includes('wire fee')||
     d.includes('transfer fee')||d.includes('atm fee')||d.includes('overdraft')||
     d.includes('monthly fee')||d.includes('account fee')) return 'Bank Fees';

  // ── Office ────────────────────────────────────────────────────────────────
  if(d.includes('office')||d.includes('staples')||d.includes('office depot')||
     d.includes('officemax')||d.includes('printer')||d.includes('postage')||
     d.includes('stationery')) return 'Office Expense';

  // ── Business License ──────────────────────────────────────────────────────
  if(d.includes('business license')||d.includes('biz license')||d.includes('permit')||
     d.includes('str permit')||d.includes('short term rental permit')||
     d.includes('city license')||d.includes('county license')) return 'Business License';

  // ── Contract Labour ───────────────────────────────────────────────────────
  if(d.includes('contractor')||d.includes('contract labor')||d.includes('contract labour')||
     d.includes('subcontract')||d.includes('freelance')||d.includes('1099')||
     d.includes('landscap')||d.includes('lawn')||d.includes('pest control')||
     d.includes('exterminator')||d.includes('pool service')||d.includes('hot tub service')) return 'Contract Labour';

  return 'Other Expense';
};

const parseExpenseCSV = file => new Promise((resolve,reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const isPDF = file.name.toLowerCase().endsWith('.pdf');
      if(isPDF) throw new Error('PDF not supported for expense upload — please export as CSV or Excel from your card portal');
      const wb = XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{defval:null});
      if(!rows.length) throw new Error('No rows found');
      const keys = Object.keys(rows[0]).map(k=>k.trim());
      const find = (...terms) => keys.find(k=>terms.some(t=>k.toLowerCase().includes(t)))||null;
      const dateCol = find('date','posted','trans date','transaction date');
      const descCol = find('description','memo','narrative','merchant','payee','details');
      const amtCol  = find('amount','debit','charge','spend');
      const cardCol = find('card','account','last 4','last four','member','source');
      const txns = rows.map((r,i)=>{
        const rawDate = r[dateCol];
        let date = null;
        if(rawDate instanceof Date) date = rawDate.toISOString().split('T')[0];
        else if(rawDate) date = String(rawDate);
        let rawAmt = parseFloat(String(r[amtCol]||'0').replace(/[$,\s]/g,''))||0;
        const desc = String(r[descCol]||'').trim();
        const card = r[cardCol]?String(r[cardCol]).trim():'';
        const cat = bestExpCategory(desc);
        // Detect sign convention from first non-zero row (handled per-file below)
        return {id:'exp-'+i, date, description:desc, rawAmt,
          amount:Math.abs(rawAmt), isRefund:false, card, category:cat, selected:false, addedToPL:false};
      }).filter(t=>t.date&&t.amount!==0);  // keep all non-zero; refunds flagged separately
      // Detect sign convention: if majority of amounts are negative, negate them (bank-style export)
      const nonZero = txns.filter(t=>t.rawAmt!==0);
      const negCount = nonZero.filter(t=>t.rawAmt<0).length;
      const useNegAsExpense = negCount > nonZero.length / 2;
      const final = txns.map(t=>{
        const expense = useNegAsExpense ? -t.rawAmt : t.rawAmt;  // positive = expense
        return {...t, amount:Math.abs(expense), isRefund: expense < 0};
      }).filter(t=>t.date && t.amount > 0.01 && !t.isRefund);
      resolve(final);
    } catch(err){reject(err);}
  };
  reader.readAsArrayBuffer(file);
});

  const safe = useMemo(()=>(ownerExpenses||[]).map(e=>({

    description: e.description || '',

  const catTotals=useMemo(()=>{const m={};safe.forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});return m;},[safe]);
  const selTotal= useMemo(()=>[...selected].reduce((s,id)=>{const e=safe.find(x=>x.id===id);return s+(e?e.amount:0);},0),[selected,safe]);

  const descOptions = useMemo(()=>{

  const filtered= useMemo(()=>{

    return rows;
  },[safe,filterSt,filterCat,cardFilter,descSearch,dateSearch,amtSearch,catSearch,cardSearch,listingSearch]);

  const allSel = filtered.length>0 && filtered.every(e=>selected.has(e.id));

  // ── Purchase upload + matching ──────────────────────────────────────────────
  const parsePurchaseFile = async file => {
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{defval:null});
          if(!rows.length) throw new Error('No rows found');
          // Exact-match first, then partial — handles Amazon, Wayfair, generic CSVs
          const colKeys=Object.keys(rows[0]);
          const findCol=(...terms)=>{
            var exact=colKeys.find(k=>terms.some(t=>k.toLowerCase()===t));
            return exact||colKeys.find(k=>terms.some(t=>k.toLowerCase().includes(t)))||null;
          };
          // Amazon: 'Order Date' / 'Title' / 'Item Net Total'
          // Wayfair: 'Order Date' / 'Product Name' / 'Price'
          const dateCol  = findCol('order date','date','purchase date','posted');
          // Use Order Net Total (includes tax) — this is what posts to the credit card
          const amtCol   = findCol('order net total','item net total','payment amount','order total','item total','amount','total','price');
          const titleCol   = findCol('title','product name','item description','item name','description','memo','name');
          // 'Segment' = Amazon full category path (e.g. "Furniture and Furnishings")
          // Search by exact name first, then fallback
          const segmentCol = (()=>{
            // exact name search (case-insensitive)
            return colKeys.find(k=>k.trim().toLowerCase()==='segment')
              || colKeys.find(k=>k.trim().toLowerCase()==='family')
              || colKeys.find(k=>k.toLowerCase().includes('segment'))
              || colKeys.find(k=>k.toLowerCase().includes('category'))
              || null;
          })();
          const parsed=rows.map((r,i)=>{
            // Parse date — handle MM/DD/YYYY string (Amazon) or Date object
            const rawDate=r[dateCol];
            let date='';
            if(rawDate instanceof Date){
              date=rawDate.getFullYear()+'-'+String(rawDate.getMonth()+1).padStart(2,'0')+'-'+String(rawDate.getDate()).padStart(2,'0');
            } else if(rawDate){
              const s=String(rawDate).trim();
              // MM/DD/YYYY → YYYY-MM-DD
              const mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
              if(mdy) date=mdy[3]+'-'+mdy[1].padStart(2,'0')+'-'+mdy[2].padStart(2,'0');
              else date=s.replace(/T.*/,'').slice(0,10);
            }
            // Product description from title column
            let desc=titleCol?String(r[titleCol]||'').trim():'';
            if(!desc) desc=Object.values(r).filter(function(v){return v&&typeof v==='string'&&v.length>4&&isNaN(Number(v));}).slice(0,3).join(' | ').slice(0,100);
            if(!desc) desc='Purchase';
            // Truncate long titles at a comma boundary (Amazon titles are very long)
            if(desc.length>80){
              var cut=desc.slice(0,80).lastIndexOf(',');
              desc=cut>20?desc.slice(0,cut).trim():desc.slice(0,80).trim();
            }
            // Amount
            const amt=Math.abs(parseFloat(String(r[amtCol]||'0').replace(/[^0-9.]/g,''))||0);
            if(!date||!amt) return null;
            const seg=segmentCol?String(r[segmentCol]||'').trim():'';
            return {id:'pur-'+i, date, description:desc, segment:seg, amount:amt, merchant:file.name.replace(/\.[^.]+$/,'')};
          }).filter(Boolean);
          resolve(parsed);
        }catch(err){reject(err);}
      };
      reader.readAsArrayBuffer(file);
    });
  };

  const autoMatch = (purchaseList, ccList) => {
    const used=new Set();
    const isGeneric=desc=>{
      const d=normStr(desc);
      return d.includes('late fee')||d.includes('interest charge')||
             d.includes('annual fee')||d.includes('minimum payment')||
             d.includes('finance charge')||d.includes('returned payment')||
             d.includes('credit adjustment');
    };
    return purchaseList.map(p=>{
      const pDate=new Date(p.date);
      let best=null;
      // Step 1: find all CC transactions with EXACT same amount (to the cent)
      const exactAmt=ccList.filter(cc=>
        !used.has(cc.id) &&
        !isGeneric(cc.description) &&
        Math.abs(Math.abs(cc.amount)-p.amount)<0.01
      );
      // Step 2: among exact-amount matches, pick the one with date within ±7 days
      // (Amazon orders: 1-3 days to charge, CC posting adds 1-2 more days)
      const inWindow=exactAmt.filter(cc=>{
        const daysDiff=Math.abs((new Date(cc.date)-pDate)/(1000*60*60*24));
        return daysDiff<=7;
      });
      if(inWindow.length>0){
        // Pick closest date
        best=inWindow.reduce((a,b)=>{
          const da=Math.abs((new Date(a.date)-pDate)/(1000*60*60*24));
          const db=Math.abs((new Date(b.date)-pDate)/(1000*60*60*24));
          return da<=db?a:b;
        });
      }
      if(best) used.add(best.id);
      return {
        id:'rm-'+p.id,
        purchase:p,
        ccId:best?best.id:null,
        cc:best||null,
        category:bestExpCategory(p.description),
        comment:p.segment||p.description,
        reconciled:false,
      };
    });
  };

  // ── Main page (always rendered — upload inline in header) ───────────────────

            boxShadow:'0 8px 32px rgba(0,0,0,0.12)',padding:16,minWidth:280}},

              h('input',{type:'file',multiple:true,accept:'.xlsx,.csv',style:{display:'none'},
                onChange:e=>{if(e.target.files.length) handleUpload(Array.from(e.target.files),uploadCard);}}),

// ── Setups Page ───────────────────────────────────────────────────────────────
const SetupsPage = ({settings, updateSettings}) => {
  const [activeTab, setActiveTab] = useState('expense'); // expense | income
  const [newItem,   setNewItem]   = useState('');
  const [editIdx,   setEditIdx]   = useState(null);
  const [editVal,   setEditVal]   = useState('');
  const [dragIdx,   setDragIdx]   = useState(null);
  const [msg,       setMsg]       = useState(null);

  const cats    = activeTab==='expense' ? settings.expCategories : settings.incCategories;
  const setList = list => {
    const next = activeTab==='expense'
      ? {...settings, expCategories: list}
      : {...settings, incCategories: list};
    updateSettings(next);
    setMsg({type:'success', text:'Saved'});
    setTimeout(()=>setMsg(null), 1800);
  };

  const add = () => {
    const v = newItem.trim();
    if(!v) return;
    if(cats.includes(v)){ setMsg({type:'error',text:'Category already exists'}); return; }
    setList([...cats, v]);
    setNewItem('');
  };

  const remove = idx => {
    if(!confirm('Remove "'+cats[idx]+'"?')) return;
    setList(cats.filter((_,i)=>i!==idx));
  };

  const saveEdit = idx => {
    const v = editVal.trim();
    if(!v) return;
    const next = [...cats];
    next[idx] = v;
    setList(next);
    setEditIdx(null); setEditVal('');
  };

  const moveUp   = idx => { if(idx===0) return; const n=[...cats]; [n[idx-1],n[idx]]=[n[idx],n[idx-1]]; setList(n); };
  const moveDown = idx => { if(idx===cats.length-1) return; const n=[...cats]; [n[idx],n[idx+1]]=[n[idx+1],n[idx]]; setList(n); };

  const reset = () => {
    if(!confirm('Reset to default categories? Your custom categories will be lost.')) return;
    setList(activeTab==='expense' ? [...DEFAULT_EXP_CATEGORIES] : [...DEFAULT_INC_CATEGORIES]);
  };

  const tabStyle = active => ({
    padding:'8px 20px', borderRadius:'6px 6px 0 0', border:'none',
    fontFamily:font, fontSize:13, fontWeight:active?700:500, cursor:'pointer',
    background:active?T.white:'transparent', color:active?T.navy:T.textSub,
    borderBottom:active?'2px solid '+T.navy:'2px solid transparent',
  });

  return h('div',null,
    h(SectionHeader,{title:'Setups',sub:'Manage expense and income categories used throughout the application'}),
    h(AlertBanner,{msg,onClose:()=>setMsg(null)}),

    // ── Tabs ───────────────────────────────────────────────────────────────
    h('div',{style:{display:'flex',gap:2,borderBottom:'1px solid '+T.border,marginBottom:20}},
      h('button',{style:tabStyle(activeTab==='expense'),onClick:()=>{setActiveTab('expense');setEditIdx(null);setNewItem('');}},
        'Expense Categories ('+settings.expCategories.length+')'),
      h('button',{style:tabStyle(activeTab==='income'),onClick:()=>{setActiveTab('income');setEditIdx(null);setNewItem('');}},
        'Income Categories ('+settings.incCategories.length+')')),

    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 360px',gap:20,alignItems:'start'}},

      // ── Category list ────────────────────────────────────────────────────
      h('div',{style:{background:T.white,border:'1px solid '+T.border,borderRadius:10,overflow:'hidden'}},
        h('div',{style:{padding:'12px 16px',borderBottom:'1px solid '+T.border,display:'flex',
          alignItems:'center',justifyContent:'space-between',background:T.gray0}},
          h('span',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font}},
            cats.length+' categories'),
          h('button',{onClick:reset,style:{padding:'4px 12px',borderRadius:6,fontSize:11,
            fontFamily:font,fontWeight:500,cursor:'pointer',
            border:'1px solid '+T.red+'40',background:T.redLight,color:T.red}},
            'Reset to defaults')),
        h('div',{style:{maxHeight:520,overflowY:'auto'}},
          cats.map((cat,idx)=>
            h('div',{key:idx,style:{display:'flex',alignItems:'center',gap:8,
              padding:'8px 14px',borderBottom:'1px solid '+T.border,
              background:editIdx===idx?T.blueLight:idx%2===0?T.white:T.gray0,
              transition:'background 0.1s'}},
              // Drag handle / order buttons
              h('div',{style:{display:'flex',flexDirection:'column',gap:1,flexShrink:0}},
                h('button',{onClick:()=>moveUp(idx),disabled:idx===0,style:{
                  width:16,height:14,border:'none',background:'none',cursor:idx===0?'default':'pointer',
                  color:idx===0?T.gray2:T.gray4,fontSize:10,lineHeight:1,padding:0}},'▲'),
                h('button',{onClick:()=>moveDown(idx),disabled:idx===cats.length-1,style:{
                  width:16,height:14,border:'none',background:'none',cursor:idx===cats.length-1?'default':'pointer',
                  color:idx===cats.length-1?T.gray2:T.gray4,fontSize:10,lineHeight:1,padding:0}},'▼')),
              // Index badge
              h('span',{style:{fontSize:10,color:T.gray3,fontFamily:mono,width:24,flexShrink:0,textAlign:'right'}},
                (idx+1)+'.'),
              // Name / edit field
              editIdx===idx
                ? h('input',{autoFocus:true,value:editVal,
                    onChange:e=>setEditVal(e.target.value),
                    onKeyDown:e=>e.key==='Enter'?saveEdit(idx):e.key==='Escape'?setEditIdx(null):null,
                    style:{flex:1,padding:'4px 8px',borderRadius:5,border:'1px solid '+T.blue,
                      fontSize:12,fontFamily:font}})
                : h('span',{style:{flex:1,fontSize:12,color:T.text,fontFamily:font}},cat),
              // Action buttons
              editIdx===idx
                ? h('div',{style:{display:'flex',gap:4,flexShrink:0}},
                    h('button',{onClick:()=>saveEdit(idx),style:{padding:'3px 10px',borderRadius:5,
                      fontSize:11,fontFamily:font,fontWeight:600,cursor:'pointer',
                      background:T.navy,color:T.white,border:'none'}},'Save'),
                    h('button',{onClick:()=>setEditIdx(null),style:{padding:'3px 8px',borderRadius:5,
                      fontSize:11,fontFamily:font,cursor:'pointer',
                      background:T.gray1,color:T.textSub,border:'none'}},'Cancel'))
                : h('div',{style:{display:'flex',gap:4,flexShrink:0}},
                    h('button',{onClick:()=>{setEditIdx(idx);setEditVal(cat);},style:{
                      padding:'3px 8px',borderRadius:5,fontSize:11,fontFamily:font,cursor:'pointer',
                      border:'1px solid '+T.border,background:T.white,color:T.textSub}},'Edit'),
                    h('button',{onClick:()=>remove(idx),style:{
                      padding:'3px 8px',borderRadius:5,fontSize:11,fontFamily:font,cursor:'pointer',
                      border:'1px solid '+T.red+'40',background:T.redLight,color:T.red}},'✕')))))),

      // ── Add new panel ────────────────────────────────────────────────────
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',{style:{background:T.white,border:'1px solid '+T.border,borderRadius:10,padding:'20px'}},
          h('div',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font,marginBottom:12}},
            'Add New Category'),
          h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
            h('input',{
              value:newItem,
              onChange:e=>setNewItem(e.target.value),
              onKeyDown:e=>e.key==='Enter'&&add(),
              placeholder:'Category name…',
              style:{width:'100%',padding:'8px 12px',borderRadius:7,fontSize:12,fontFamily:font,
                border:'1px solid '+T.border,boxSizing:'border-box'}}),
            h('button',{onClick:add,style:{
              width:'100%',padding:'9px',borderRadius:7,fontFamily:font,fontSize:13,
              fontWeight:600,cursor:'pointer',background:T.navy,color:T.white,border:'none',
              display:'flex',alignItems:'center',justifyContent:'center',gap:6}},
              h(Icon,{d:'M12 5v14M5 12h14',size:14,color:'currentColor'}),'Add Category'))),

        // Info box
        h('div',{style:{background:T.blueLight,border:'1px solid '+T.blue+'30',borderRadius:10,padding:'16px'}},
          h('div',{style:{fontSize:12,fontWeight:600,color:T.blue,fontFamily:font,marginBottom:6}},
            'How categories are used'),
          h('div',{style:{fontSize:11,color:T.navy,fontFamily:font,lineHeight:1.6}},
            activeTab==='expense'
              ? 'Expense categories appear in the Owner Expenses page dropdown and group expenses in the P&L Report under "Owner Direct Expenses".'
              : 'Income categories can be used to tag and group revenue sources in the P&L Report and Trend Analysis.')))));
};


const NAV=[
  {id:'dashboard',label:'Dashboard',icon:IC.home},
  {id:'reservations',label:'Reservations',icon:IC.list},
  {id:'statements',label:'Owner Statements',icon:IC.file},
  {id:'reconciliation',label:'Income Reconciliation',icon:IC.link},
  {id:'bank',label:'Bank Reconciliation',icon:IC.bank},
  {id:'ownerexp',label:'Owner Expenses',icon:IC.receipt},
  {id:'pl',label:'P&L Report',icon:IC.dollar},
  {id:'trends',label:'Trend Analysis',icon:IC.trend},
  {id:'setups',label:'Setups',icon:IC.settings},
];

const STORAGE_KEY='rental_recon_v4';
const emptyYear=()=>({reservations:[],statements:{},readyForAnalysis:false,bankTxns:[],ownerExpenses:[],reconResults:[],purchaseMatches:[]});

function saveToStorage(yearData,activeYear){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({yearData,activeYear,savedAt:new Date().toISOString()}));}catch(e){}
}
function loadFromStorage(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(!r) return null;
    const parsed=JSON.parse(r);
    // Sanitize: ensure all statement objects have bookings/expenses arrays
    // (older saved data may be missing these fields)
    if(parsed?.yearData){
      for(const [yrKey,yr] of Object.entries(parsed.yearData)){
        // Clear reconResults computed before year-isolation fix (cross-year matches)
        if(Array.isArray(yr.reconResults)){
          yr.reconResults=yr.reconResults.filter(r=>{
            const y=String(r.checkInDate||'').slice(0,4);
            return !y||y===String(yrKey);
          });
          // Backfill stmtGuestName/stmtMonth for results saved before these fields existed
          const MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          yr.reconResults=yr.reconResults.map(r=>{
            if(r.matchStatus==='MATCHED'&&r.stmt&&(!r.stmtGuestName&&!r.stmtMonth)){
              const mo=r.stmt._month;
              return {...r,
                stmtGuestName:r.stmt.guest||'',
                stmtMonth:mo?(MNAMES[(mo||1)-1]+' '+yrKey):'—'
              };
            }
            return r;
          });
        }
        for(const stmt of Object.values(yr.statements||{})){
          if(stmt){
            if(!Array.isArray(stmt.bookings)) stmt.bookings=[];
            if(!Array.isArray(stmt.expenses)) stmt.expenses=[];
          }
        }
        if(!Array.isArray(yr.bankTxns))      yr.bankTxns=[];
        if(!Array.isArray(yr.ownerExpenses))    yr.ownerExpenses=[];
        if(!Array.isArray(yr.purchaseMatches))  yr.purchaseMatches=[];
        if(!Array.isArray(yr.reservations))  yr.reservations=[];
      }
    }
    return parsed;
  }catch(e){console.warn('Load failed:',e);return null;}
}
function clearStorage(){try{localStorage.removeItem(STORAGE_KEY);}catch(e){}}

function App(){
  const [page,setPage]=useState('dashboard');
  const [saveStatus,setSaveStatus]=useState(null);
  const saveTimerRef=useRef(null);

  const [activeYear,setActiveYear]=useState(()=>{const s=loadFromStorage();return s?.activeYear||2024;});
  const initSettings=()=>{ const s=loadSettings(); return { expCategories:(s?.expCategories?.length)?s.expCategories:[...DEFAULT_EXP_CATEGORIES], incCategories:(s?.incCategories?.length)?s.incCategories:[...DEFAULT_INC_CATEGORIES] }; };
  const [settings,setSettings]=useState(initSettings);
  const updateSettings=s=>{ setSettings(s); saveSettings(s); _expCats=s.expCategories; _incCats=s.incCategories; };
  const [yearData,setYearData]=useState(()=>{const s=loadFromStorage();return(s?.yearData&&Object.keys(s.yearData).length>0)?s.yearData:{2024:emptyYear()};});
  const [showYearDropdown,setShowYearDropdown]=useState(false);
  const [addYearInput,setAddYearInput]=useState('');
  const [addYearError,setAddYearError]=useState('');
  const dropdownRef=useRef(null);

  const isFirstRender=useRef(true);
  useEffect(()=>{
    if(isFirstRender.current){isFirstRender.current=false;return;}
    setSaveStatus('saving');
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>{
      try{saveToStorage(yearData,activeYear);setSaveStatus('saved');setTimeout(()=>setSaveStatus(null),2500);}
      catch(e){setSaveStatus('error');}
    },600);
    return()=>clearTimeout(saveTimerRef.current);
  },[yearData,activeYear]);

  useEffect(()=>{
    const handler=e=>{if(dropdownRef.current&&!dropdownRef.current.contains(e.target))setShowYearDropdown(false);};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  const availableYears=Object.keys(yearData).map(Number).sort((a,b)=>b-a);
  const yd=yearData[activeYear]||emptyYear();
  const reservations=yd.reservations;
  const statements=yd.statements;
  const readyForAnalysis=yd.readyForAnalysis;
  const bankTxns=yd.bankTxns||[];
  const setBankTxns=fn=>setYearData(prev=>({...prev,[activeYear]:{...prev[activeYear],bankTxns:typeof fn==='function'?fn(prev[activeYear].bankTxns||[]):fn}}));
  const ownerExpenses=yd.ownerExpenses||[];
  const setOwnerExpenses=fn=>setYearData(prev=>({...prev,[activeYear]:{...prev[activeYear],ownerExpenses:typeof fn==='function'?fn(prev[activeYear].ownerExpenses||[]):fn}}));
  const reconResults=(yearData[activeYear]||emptyYear()).reconResults||[];
  const setReconResults=r=>setYearData(prev=>({...prev,[activeYear]:{...prev[activeYear],reconResults:r}}));
  const purchaseMatches=(yearData[activeYear]||emptyYear()).purchaseMatches||[];
  const setPurchaseMatches=fn=>setYearData(prev=>({...prev,[activeYear]:{...prev[activeYear],purchaseMatches:typeof fn==='function'?fn(prev[activeYear].purchaseMatches||[]):fn}}));

  const setReservations=fn=>setYearData(prev=>({...prev,[activeYear]:{...prev[activeYear],reservations:typeof fn==='function'?fn(prev[activeYear].reservations):fn}}));
  const setStatements=fn=>setYearData(prev=>({...prev,[activeYear]:{...prev[activeYear],statements:typeof fn==='function'?fn(prev[activeYear].statements):fn}}));
  const setReadyForAnalysis=v=>setYearData(prev=>({...prev,[activeYear]:{...prev[activeYear],readyForAnalysis:v}}));
  const switchYear=yr=>{setActiveYear(yr);setPage('dashboard');setShowYearDropdown(false);};

  const addYear=()=>{
    const yr=parseInt(addYearInput);
    if(isNaN(yr)||yr<1990||yr>2100){setAddYearError('Enter a valid year (e.g. 2022)');return;}
    if(yearData[yr]){setAddYearError(yr+' already exists');return;}
    setYearData(prev=>({...prev,[yr]:emptyYear()}));
    setAddYearInput('');setAddYearError('');switchYear(yr);
  };
  const removeYear=yr=>{
    if(Object.keys(yearData).length<=1)return;
    setYearData(prev=>{const next={...prev};delete next[yr];return next;});
    if(activeYear===yr){const rem=Object.keys(yearData).map(Number).filter(y=>y!==yr).sort((a,b)=>b-a);setActiveYear(rem[0]);setPage('dashboard');}
    setShowYearDropdown(false);
  };
  const clearAllData=()=>{
    if(!confirm('Clear ALL data for all years? This cannot be undone.'))return;
    clearStorage();setYearData({2024:emptyYear()});setActiveYear(2024);setPage('dashboard');
  };

  const stmtCount=Object.values(statements).filter(Boolean).length;
  const hasData=yr=>(yearData[yr]?.reservations?.length||0)>0||Object.values(yearData[yr]?.statements||{}).some(Boolean);
  const yearColor=yr=>YEAR_COLOR_PALETTE[availableYears.slice().reverse().indexOf(yr)%YEAR_COLOR_PALETTE.length];

  const renderPage=()=>{
    switch(page){
      case 'dashboard':      return h(DashboardPage,{reservations,statements,readyForAnalysis,year:activeYear,ownerExpenses,purchaseMatches,setPage});
      case 'reservations':   return h(ReservationsPage,{reservations,setReservations,readyForAnalysis,setReadyForAnalysis});
      case 'statements':     return h(StatementsPage,{statements,setStatements,activeYear,availableYears,setActiveYear:yr=>{switchYear(yr);}});
      case 'reconciliation': return h(ReconciliationPage,{reservations,statements,readyForAnalysis,reconResults,setReconResults,year:activeYear});
      case 'pl':             return h(PLPage,{statements,year:activeYear,ownerExpenses});
      case 'bank':           return h(BankPage,{bankTxns,setBankTxns,statements,reservations});
      case 'ownerexp':       return h(OwnerExpensesPage,{ownerExpenses,setOwnerExpenses,year:activeYear,expCategories:settings.expCategories,purchaseMatches,setPurchaseMatches});
      case 'trends':         return h(TrendPage,{yearData});
      case 'setups':         return h(SetupsPage,{settings,updateSettings});
      default: return null;
    }
  };

  return h('div',{style:{display:'flex',height:'100vh',fontFamily:font,background:T.gray0}},
    h('div',{style:{width:220,background:T.navy,display:'flex',flexDirection:'column',flexShrink:0,height:'100vh',position:'sticky',top:0,overflow:'hidden'}},
      h('div',{style:{padding:'20px 20px 16px',borderBottom:'1px solid '+T.navyMid}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
          h('div',{style:{width:34,height:34,borderRadius:8,background:T.blue,display:'flex',alignItems:'center',justifyContent:'center'}},
            h(Icon,{d:IC.home,size:16,color:T.white})),
          h('div',null,
            h('div',{style:{fontSize:13,fontWeight:700,color:T.white,lineHeight:1.3}},'Rental Recon'),
            h('div',{style:{fontSize:10,color:T.gray3,letterSpacing:0.3}},'HostAway Integration'))),
        h('div',{ref:dropdownRef,style:{position:'relative'}},
          h('button',{onClick:()=>{setShowYearDropdown(v=>!v);setAddYearInput('');setAddYearError('');},
            style:{width:'100%',padding:'8px 12px',borderRadius:7,border:'1px solid rgba(255,255,255,0.15)',
              background:'rgba(255,255,255,0.08)',cursor:'pointer',fontFamily:font,
              display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              h('div',{style:{width:8,height:8,borderRadius:2,background:yearColor(activeYear),flexShrink:0}}),
              h('span',{style:{fontSize:13,fontWeight:700,color:T.white}},'FY '+activeYear),
              hasData(activeYear)&&h('span',{style:{fontSize:9,fontWeight:600,color:T.teal,background:'rgba(13,125,107,0.2)',padding:'1px 5px',borderRadius:8}},'data')),
            h('span',{style:{color:T.gray3,fontSize:10}},showYearDropdown?'▲':'▼')),
          showYearDropdown&&h('div',{style:{position:'absolute',top:'calc(100% + 6px)',left:0,right:0,
            background:'#1e2d54',border:'1px solid rgba(255,255,255,0.12)',borderRadius:8,
            boxShadow:'0 8px 24px rgba(0,0,0,0.4)',zIndex:1000,overflow:'hidden'}},
            h('div',{style:{maxHeight:200,overflowY:'auto'}},
              availableYears.map(yr=>h('div',{key:yr,style:{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',
                background:activeYear===yr?'rgba(255,255,255,0.1)':'transparent',cursor:'pointer'},onClick:()=>switchYear(yr)},
                h('div',{style:{width:8,height:8,borderRadius:2,background:yearColor(yr),flexShrink:0}}),
                h('span',{style:{flex:1,fontSize:12,fontWeight:activeYear===yr?700:400,color:activeYear===yr?T.white:T.gray3,fontFamily:font}},'FY '+yr),
                hasData(yr)&&h('span',{style:{fontSize:9,color:T.teal,fontWeight:600}},'●'),
                Object.keys(yearData).length>1&&h('span',{onClick:e=>{e.stopPropagation();removeYear(yr);},
                  style:{fontSize:12,color:T.gray4,cursor:'pointer',padding:'0 2px'}},
                  '×')))),
            h('div',{style:{borderTop:'1px solid rgba(255,255,255,0.08)',padding:'10px 12px'}}),
            h('div',{style:{padding:'0 12px 10px'}},
              h('div',{style:{fontSize:10,color:T.gray3,fontFamily:font,marginBottom:6,fontWeight:600,letterSpacing:0.5}},'ADD YEAR'),
              h('div',{style:{display:'flex',gap:6}},
                h('input',{type:'number',placeholder:'e.g. 2022',value:addYearInput,
                  onChange:e=>{setAddYearInput(e.target.value);setAddYearError('');},
                  onKeyDown:e=>e.key==='Enter'&&addYear(),
                  style:{flex:1,padding:'6px 8px',borderRadius:5,border:'1px solid '+(addYearError?T.red:'rgba(255,255,255,0.15)'),
                    background:'rgba(255,255,255,0.06)',color:T.white,fontFamily:font,fontSize:12,outline:'none',width:0}}),
                h('button',{onClick:addYear,style:{padding:'6px 10px',borderRadius:5,border:'none',background:T.blue,
                  color:T.white,cursor:'pointer',fontFamily:font,fontSize:12,fontWeight:600,flexShrink:0}},
                  '+')),
              addYearError&&h('div',{style:{fontSize:10,color:'#ff8a8a',fontFamily:font,marginTop:4}},addYearError))))),
      h('nav',{style:{flex:1,padding:'12px 10px',overflowY:'auto'}},
        NAV.map(({id,label,icon})=>{
          const active=page===id;
          const badge=id==='statements'?stmtCount:id==='reservations'?reservations.length:null;
          return h('button',{key:id,onClick:()=>setPage(id),style:{display:'flex',alignItems:'center',gap:10,width:'100%',
            padding:'9px 12px',borderRadius:7,border:'none',cursor:'pointer',
            background:active?'rgba(255,255,255,0.12)':'transparent',
            color:active?T.white:T.gray3,fontFamily:font,fontSize:13,fontWeight:active?600:400,
            marginBottom:2,transition:'all 0.15s',textAlign:'left'}},
            h(Icon,{d:icon,size:15,color:active?T.white:T.gray4}),
            h('span',{style:{flex:1}},label),
            badge!=null&&badge>0&&h('span',{style:{fontSize:10,fontWeight:700,background:active?T.blue:T.navyMid,color:T.white,padding:'1px 6px',borderRadius:10}},badge));
        })),
      h('div',{style:{padding:'12px 16px',borderTop:'1px solid '+T.navyMid,fontSize:10,color:T.gray4,fontFamily:font}},
        h('div',null,'Rental Reconciliation'),
        h('div',{style:{marginTop:2,color:'#6b8fd4',fontWeight:600,marginBottom:8}},'FY '+activeYear),
        h('button',{onClick:clearAllData,style:{width:'100%',padding:'7px 0',borderRadius:6,
          border:'1px solid rgba(255,100,100,0.4)',background:'rgba(185,50,50,0.15)',
          color:'#ff9090',fontFamily:font,fontSize:11,cursor:'pointer',fontWeight:600,
          display:'flex',alignItems:'center',justifyContent:'center',gap:5}},
          h(Icon,{d:IC.trash,size:11,color:'#ff9090'}),
          'Clear All Data & Cache'))),
    h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{background:T.white,borderBottom:'1px solid '+T.border,padding:'14px 28px',
        display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
        h('div',{style:{fontSize:13,color:T.textSub,fontFamily:font}},
          (reservations.length>0?reservations.length+' reservations loaded':'No reservations loaded')+' · '+
          (stmtCount>0?stmtCount+'/12 statements uploaded':'No statements uploaded')),
        h('div',{style:{display:'flex',alignItems:'center',gap:12}},
          saveStatus&&h('div',{style:{fontSize:11,fontFamily:font,display:'flex',alignItems:'center',gap:5,
            color:saveStatus==='saved'?T.green:saveStatus==='error'?T.red:T.textSub}},
            saveStatus==='saving'&&h('span',{style:{display:'inline-block',width:10,height:10,borderRadius:'50%',
              border:'2px solid '+T.gray3,borderTopColor:T.blue,animation:'spin 0.8s linear infinite'}}),
            saveStatus==='saved'&&h(Icon,{d:IC.check,size:12,color:T.green}),
            saveStatus==='saving'?'Saving…':'Saved'),
          h('div',{style:{fontSize:12,fontWeight:600,color:T.blue,fontFamily:font,background:T.blueLight,padding:'3px 10px',borderRadius:12}},'FY '+activeYear),
          h('div',{style:{fontSize:11,color:T.gray3,fontFamily:font}},'Rental Reconciliation'))),
      h('div',{style:{flex:1,overflowY:'auto',padding:'28px 32px'}},renderPage())));
}

ReactDOM.render(h(App), document.getElementById('root'));
</script>
</body>
</html>
