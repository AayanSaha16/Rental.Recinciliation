const fmt$ = n => n==null ? '—' : '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => {
  if(!d) return '—';
  try {
    // Handle Excel serial numbers
    if(typeof d==='number'&&d>40000&&d<60000){
      // Convert serial to local date parts to avoid UTC timezone shift
      const utc=new Date(Math.round((d-25569)*86400*1000));
      const dt=new Date(utc.getUTCFullYear(),utc.getUTCMonth(),utc.getUTCDate());
      return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    }
    // For YYYY-MM-DD strings, parse as local time to avoid UTC midnight shift
    const iso=/^(\d{4})-(\d{2})-(\d{2})/.exec(String(d));
    if(iso){
      const dt=new Date(+iso[1],+iso[2]-1,+iso[3]);
      return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    }
    const dt=new Date(d);
    if(isNaN(dt.getTime())) return String(d);
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  } catch(e){ return String(d); }
};
const normStr = s => String(s||'').trim().toLowerCase();
const normChannel = ch => {
  const s = normStr(ch);
  if(s.includes('airbnb')) return 'Airbnb';
  if(s.includes('booking')) return 'Booking.com';
  if(s.includes('homeaway')||s.includes('vrbo')) return 'VRBO/HomeAway';
  if(s.includes('direct')||s.includes('hostaway')) return 'Direct';
  return ch||'Unknown';
};

// ── Parsers ──────────────────────────────────────────────────────────────────
const parseReservationFile = file => new Promise((resolve,reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{defval:null});
      const res = rows.map((r,i) => ({
        id:'res-'+i,
        firstName: r['Guest first name']||r['firstName']||'',
        lastName:  r['Guest last name'] ||r['lastName'] ||'',
        checkInDate:  r['Check-in date'] ||r['checkInDate'],
        checkOutDate: r['Check-out date']||r['checkOutDate'],
        channel: normChannel(r['Channel']||r['channel']||''),
        totalPrice: parseFloat(r['Total price']||r['totalPrice']||0),
        numberOfNights: parseInt(r['Number of nights']||r['numberOfNights']||0),
        numberOfGuests: parseInt(r['Number of guests']||r['numberOfGuests']||0),
        status: r['Status']||r['status']||'new',
        listing: r['Listing']||r['listing']||'',
        airbnbExpectedPayout: parseFloat(r['Airbnb expected payout amount']||0),
        currency: r['Currency']||'USD',
      })).filter(r=>r.firstName||r.checkInDate);
      resolve(res);
    } catch(err){reject(err);}
  };
  reader.readAsArrayBuffer(file);
});

const MONTH_NAMES={january:1,february:2,march:3,april:4,may:5,june:6,
  july:7,august:8,september:9,october:10,november:11,december:12};
const MONTH_ABBR={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};

const monthFromPeriod = period => {
  const s = String(period).toLowerCase();
  for(const [mn,mi] of Object.entries(MONTH_NAMES)) if(s.includes(mn)) return mi;
  return 0;
};

// Returns array of month numbers found in period string (handles "March 1 - April 30")
const monthsFromPeriod = period => {
  const s = String(period).toLowerCase();
  const found=[];
  for(const [mn,mi] of Object.entries(MONTH_NAMES)) if(s.includes(mn)&&!found.includes(mi)) found.push(mi);
  return found.sort((a,b)=>a-b);
};

const parseStatementFile = (file, month) => new Promise((resolve,reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

      // ── strip Excel apostrophe prefix from any cell value ─────────────────
      const sa = v => String(v==null?'':v).trim().replace(/^'|'$/g,'');

      // ── parse a money string → float ──────────────────────────────────────
      const money = v => parseFloat(sa(v).replace(/[^0-9.\-]/g,''))||0;

      // ── normalise a date cell → 'YYYY-MM-DD' ─────────────────────────────
      const normDate = v => {
        if(!v) return '';
        if(v instanceof Date) return v.toISOString().split('T')[0];
        if(typeof v==='number'&&v>40000&&v<60000)
          return new Date(Math.round((v-25569)*86400*1000)).toISOString().split('T')[0];
        const s=sa(v);
        // already ISO
        if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // M/D/YYYY or M-D-YYYY
        const m2=/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/.exec(s);
        if(m2){const y=m2[3].length===2?'20'+m2[3]:m2[3];return y+'-'+m2[1].padStart(2,'0')+'-'+m2[2].padStart(2,'0');}
        return s;
      };

      const isDate = v => {
        if(!v) return false;
        if(v instanceof Date) return true;
        if(typeof v==='number'&&v>40000&&v<60000) return true;
        const s=sa(v);
        return /^\d{4}-\d{2}-\d{2}$/.test(s)||/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(s);
      };

      // ── build column-index map from a header row (strips apostrophes) ─────
      const colMap = row => {
        const m={};
        (row||[]).forEach((h,i)=>{ const k=sa(h).toLowerCase(); if(k) m[k]=i; });
        return m;
      };

      // ── find best column index matching any of the given substrings ───────
      const find = (cm,...terms) => {
        for(const t of terms)
          for(const [k,i] of Object.entries(cm))
            if(k.includes(t)) return i;
        return -1;
      };

      // ═══════════════════════════════════════════════════════════════════════
      // PASS 1 — summary header fields (period, revenue, payout, commission)
      // ═══════════════════════════════════════════════════════════════════════
      let period='', rentalRevenue=0, pmCommission=0, ownerPayout=0;
      // nextVal: find the first non-empty cell AFTER ci in the same row
      const nextVal = (row,ci) => { for(let j=ci+1;j<(row||[]).length;j++){ const v=sa(row[j]); if(v) return row[j]; } return null; };
      for(const row of raw){
        for(let ci=0;ci<(row||[]).length;ci++){
          const c=sa(row[ci]);
          if(c==='Statement period:')  period=sa(nextVal(row,ci))||period;
          if(c==='Rental Revenue:')    rentalRevenue=money(nextVal(row,ci))||rentalRevenue;
          if(c==='Owner Payout:'||c==='Property Manager Payout:') ownerPayout=money(nextVal(row,ci))||ownerPayout;
          if(c==='Pm Commission:'||c==='PM Commission:'||c==='Property Manager Payout:'){
            const raw=sa(nextVal(row,ci)||'');
            // Could be '18.00 %' (percent) or '$618.24' (dollar) or '618.24 USD'
            if(raw.includes('%')){
              // Store as negative to flag it's a rate — resolved after rentalRevenue is known
              const pct=parseFloat(raw.replace(/[^0-9.]/g,''));
              if(pct>0) pmCommission=-(pct/100); // negative = rate flag
            } else {
              pmCommission=Math.abs(money(raw))||pmCommission;
            }
          }
        }
      }
      // Resolve pmCommission: if stored as negative rate, multiply by rentalRevenue
      if(pmCommission<0&&rentalRevenue) pmCommission=rentalRevenue*Math.abs(pmCommission);
      if(!pmCommission&&rentalRevenue&&ownerPayout) pmCommission=rentalRevenue-ownerPayout;

      // ═══════════════════════════════════════════════════════════════════════
      // PASS 2 — RENTAL ACTIVITY section → bookings (label-driven, any column order)
      // ═══════════════════════════════════════════════════════════════════════
      const bookings=[], expenses=[];
      let actIdx=-1, cm={};
      for(let i=0;i<raw.length;i++){
        if((raw[i]||[]).some(c=>sa(c)==='RENTAL ACTIVITY')){
          cm=colMap(raw[i+1]); actIdx=i+2; break;
        }
      }

      if(actIdx>=0){
        // ── Find each field's column index purely by its header label ────────
        // Check-in date
        const CI_date = find(cm,'check-in date','check-in','checkin','check in');
        // Guest
        const CI_guest = find(cm,'guest','customer');
        // Nights
        const CI_nights = find(cm,'nights','night');
        // Listing
        const CI_listing = find(cm,'listing','property','unit');
        // Channel
        const CI_channel = find(cm,'channel');
        // Rental Revenue — exact match first (skip 'confirmed' variant)
        const CI_rev = cm['rental revenue']!=null ? cm['rental revenue']
                     : (()=>{ for(const[k,i] of Object.entries(cm)) if(k.includes('rental revenue')&&!k.includes('confirmed')) return i; return -1; })();
        // Total Payout — separate column (Green Meadows format: includes cleaning fee)
        const CI_totalPayout = cm['total payout']!=null ? cm['total payout'] : -1;
        // PM Commission — % column (has % or percent in label) vs dollar column
        const CI_pmPct = (()=>{ for(const[k,i] of Object.entries(cm)) if(k.includes('commission')&&(k.includes('%')||k.includes('percent')||k.includes('pct'))) return i; return -1; })();
        const CI_pmDollar = (()=>{
          // Dollar commission column (no % marker)
          for(const[k,i] of Object.entries(cm)) if(k.includes('commission')&&!k.includes('%')&&!k.includes('percent')&&!k.includes('pct')) return i;
          // 'property manager payout' = PM commission in Green Meadows format
          for(const[k,i] of Object.entries(cm)) if(k.includes('property manager')&&k.includes('payout')) return i;
          for(const[k,i] of Object.entries(cm)) if(k.includes('manager')&&k.includes('payout')) return i;
          return -1;
        })();
        // Owner Payout — 'owner payout' specifically (not 'property manager payout')
        const CI_payout = (()=>{
          if(cm['owner payout']!=null) return cm['owner payout'];
          for(const[k,i] of Object.entries(cm)) if(k.includes('owner')&&k.includes('payout')) return i;
          for(const[k,i] of Object.entries(cm)) if(k==='payout') return i;
          return -1;
        })();

        for(let i=actIdx;i<raw.length;i++){
          const row=raw[i];
          // Stop at TOTALS or EXPENSES
          if((row||[]).some(c=>{ const s=sa(c); return s==='TOTALS'||s==='EXPENSES AND EXTRAS'; })) break;

          // Valid booking row — must have a date in the date column
          const dateCell = CI_date>=0 ? row[CI_date] : null;
          if(!dateCell||!isDate(dateCell)) continue;

          // Rental Revenue
          const rv = CI_rev>=0 ? money(row[CI_rev]) : 0;

          // PM Commission — % column takes priority
          let pm=0;
          if(CI_pmPct>=0){
            const rawPct=parseFloat(sa(row[CI_pmPct]).replace(/[^0-9.]/g,''));
            if(rawPct>0){ const rate=rawPct>1?rawPct/100:rawPct; pm=rv*rate; }
          }
          if(!pm&&CI_pmDollar>=0) pm=Math.abs(money(row[CI_pmDollar]));

          // Listing — use column exactly, strip numeric ID prefix
          let listing='';
          if(CI_listing>=0){
            const raw_l=sa(row[CI_listing]);
            const stripped=raw_l.replace(/^\([^)]+\)\s*/,'').replace(/^\d+\s+/,'').trim();
            const candidate=stripped.length>1?stripped:raw_l;
            if(/[a-zA-Z]{2,}/.test(candidate)) listing=candidate;
          }

          const tp = CI_totalPayout>=0 ? money(row[CI_totalPayout]) : 0;
          bookings.push({
            checkInDate:   normDate(dateCell),
            guest:         CI_guest>=0  ? sa(row[CI_guest])  : '',
            nights:        CI_nights>=0 ? parseInt(sa(row[CI_nights]))||0 : 0,
            listing,
            channel:       CI_channel>=0 ? normChannel(sa(row[CI_channel])) : '',
            rentalRevenue: rv,
            totalPayout:   tp,  // pre-deduction total (incl. cleaning fee) — only in some formats
            pmCommission:  pm,
            ownerPayout:   CI_payout>=0 ? money(row[CI_payout]) : 0,
          });
        }
      }

      // ═══════════════════════════════════════════════════════════════════════
      // PASS 3 — EXPENSES AND EXTRAS section
      // ═══════════════════════════════════════════════════════════════════════
      let expIdx=-1, ecm={};
      for(let i=0;i<raw.length;i++){
        if((raw[i]||[]).some(c=>sa(c)==='EXPENSES AND EXTRAS')){
          ecm=colMap(raw[i+1]); expIdx=i+2; break;
        }
      }
      if(expIdx>=0){
        const EN=find(ecm,'name','description'); const ED=find(ecm,'date');
        const EC=find(ecm,'categor');            const EL=find(ecm,'listing');
        const EA=find(ecm,'amount');
        for(let i=expIdx;i<raw.length;i++){
          const row=raw[i];
          const name=sa(EN>=0?row[EN]:row[0]);
          if(!name||name.toLowerCase()==='name'||name.toLowerCase()==='total'||name.toLowerCase()==='totals') {
            if(name.toLowerCase().startsWith('total')) break;
            continue;
          }
          const amt=money(EA>=0?row[EA]:row[6]);
          if(!amt) continue;
          expenses.push({
            description: name,
            date:        normDate(ED>=0?row[ED]:row[1]),
            category:    sa(EC>=0?row[EC]:row[2]),
            listing:     sa(EL>=0?row[EL]:row[3]).replace(/^\([^)]+\)\s*/,'').trim(),
            amount:      amt,
          });
        }
      }

      // ═══════════════════════════════════════════════════════════════════════
      // Detect months and split if combined (e.g. "March 1 - April 30")
      // ═══════════════════════════════════════════════════════════════════════
      const periodMonths=monthsFromPeriod(period);
      let filenameMonth=0;
      if(!periodMonths.length){
        const fn=file.name.toLowerCase();
        for(const[mn,mi] of Object.entries(MONTH_NAMES)) if(fn.includes(mn)){filenameMonth=mi;break;}
        if(!filenameMonth) for(const[mn,mi] of Object.entries(MONTH_ABBR)) if(fn.includes(mn)){filenameMonth=mi;break;}
      }
      const finalMonths=periodMonths.length?periodMonths:(filenameMonth?[filenameMonth]:[month||1]);

      if(finalMonths.length===1){
        resolve({month:finalMonths[0],period,rentalRevenue,pmCommission,ownerPayout,bookings,expenses});
      } else {
        // Split bookings and expenses by their actual month
        const pm={};
        for(const m of finalMonths) pm[m]={month:m,period,bookings:[],expenses:[],rentalRevenue:0,pmCommission:0,ownerPayout:0};
        for(const b of bookings){
          const d=new Date(b.checkInDate); const bm=isNaN(d)?finalMonths[0]:d.getMonth()+1;
          const t=pm[bm]||pm[finalMonths[0]];
          t.bookings.push(b); t.rentalRevenue+=b.rentalRevenue; t.pmCommission+=b.pmCommission; t.ownerPayout+=b.ownerPayout;
        }
        for(const ex of expenses){
          const d=new Date(ex.date); const em=isNaN(d)?finalMonths[0]:d.getMonth()+1;
          (pm[em]||pm[finalMonths[0]]).expenses.push(ex);
        }
        resolve(Object.values(pm).filter(m=>m.bookings.length>0||m.expenses.length>0));
      }
    } catch(err){reject(err);}
  };
  reader.readAsArrayBuffer(file);
});


const catExpense = desc => {
  const d = normStr(desc);
  if(d.includes('monthly service fee')) return 'PM Monthly Service Fee';
  if(d.includes('lakeshore')||(d.includes('construction')&&!d.includes('pest'))) return 'Maintenance & Construction';
  if(d.includes('pest control')) return 'Pest Control';
  if(d.includes('landscaping')||d.includes('weedeat')||d.includes('weeds')) return 'Landscaping';
  if(d.includes('linen')||d.includes('stain removal')) return 'Linen Service & Cleaning';
  if(d.includes('owner stay cleaning')) return 'Owner Stay – Cleaning Fee';
  if(d.includes('propane')) return 'Supplies – Propane';
  return 'Supplies – Household & Property';
};

const DropZone = ({onFiles,label,sublabel,multiple=false,accept='.xlsx,.csv'}) => {
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  const handle=files=>files.length&&onFiles(Array.from(files));
  return h('div',{
    onDragOver:e=>{e.preventDefault();setDrag(true);},
    onDragLeave:()=>setDrag(false),
    onDrop:e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files);},
    onClick:()=>ref.current.click(),
    style:{border:'2px dashed '+(drag?T.blue:T.border),borderRadius:10,padding:'32px 24px',
      textAlign:'center',cursor:'pointer',background:drag?T.blueLight:T.gray0,transition:'all 0.2s'}},
    h('input',{ref,type:'file',accept,multiple,style:{display:'none'},onChange:e=>handle(e.target.files)}),
    h('div',{style:{width:40,height:40,borderRadius:10,background:T.blueLight,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}},
      h(Icon,{d:IC.upload,size:18,color:T.blue})),
    h('div',{style:{fontSize:14,fontWeight:600,color:T.text,fontFamily:font}},label),
    h('div',{style:{fontSize:12,color:T.textSub,fontFamily:font,marginTop:4}},sublabel));
};

const Table = ({cols,rows,selected,onSelect,onSelectAll,allSelected,maxRows=500,emptyMsg='No data'}) => {

    fontFamily:font,fontSize:13,background:T.gray0,borderRadius:8,border:'1px solid '+T.border}},emptyMsg);
  const visible=rows.slice(0,maxRows);
  return h('div',{style:{overflowX:'auto',borderRadius:8,border:'1px solid '+T.border}},
    h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:font}},
      h('thead',null,
        h('tr',{style:{background:T.gray0,borderBottom:'1px solid '+T.border}},
          onSelect&&h('th',{style:{padding:'10px 12px',width:36,textAlign:'center'}},
            onSelectAll&&h('input',{type:'checkbox',checked:!!allSelected,onChange:onSelectAll,
              style:{width:14,height:14,cursor:'pointer',accentColor:T.navy}})),

            fontWeight:600,color:T.textSub,whiteSpace:'nowrap',borderRight:'1px solid '+T.border}},c.label)))),
      h('tbody',null,
        visible.map((row,i)=>
          h('tr',{key:row.id||i,onClick:()=>onSelect&&onSelect(row.id),
            style:{background:selected?.has(row.id)?T.blueLight:i%2===0?T.white:T.gray0,
              borderBottom:'1px solid '+T.border,cursor:onSelect?'pointer':'default'}},
            onSelect&&h('td',{style:{padding:'8px 12px',textAlign:'center'}},
              h('input',{type:'checkbox',checked:!!selected?.has(row.id),
                onChange:()=>onSelect(row.id),onClick:e=>e.stopPropagation()})),
            cols.map(c=>h('td',{key:c.key,style:{padding:'8px 12px',color:T.text,
              borderRight:'1px solid '+T.border,whiteSpace:'nowrap',
              textAlign:c.align||'left',...(c.cellStyle?.(row)||{})},},
              c.render?c.render(row[c.key],row):(row[c.key]??'—'))))))),
    rows.length>maxRows&&h('div',{style:{padding:'8px 16px',fontSize:11,color:T.textSub,
      background:T.gray0,borderTop:'1px solid '+T.border,fontFamily:font}},
      'Showing first '+maxRows+' of '+rows.length+' rows'));
};

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Dashboard ────────────────────────────────────────────────────────────────
const PROP_COLORS=['#2a5fc4','#0d7d6b','#c47a0a','#b93232','#7c3d8f'];

const DashboardPage = ({reservations,statements,year=2024,ownerExpenses=[],purchaseMatches=[],setPage}) => {
  const stmts=Object.values(statements).filter(Boolean);
  const totalRev=stmts.reduce((s,m)=>s+(m.rentalRevenue||0),0);
  const totalPM=stmts.reduce((s,m)=>s+(m.pmCommission||0),0);
  const totalPayout=stmts.reduce((s,m)=>s+(m.ownerPayout||0),0);
  const totalExp=stmts.flatMap(m=>m.expenses||[]).reduce((s,e)=>s+(e.amount||0),0);
  const totalNights=stmts.flatMap(m=>m.bookings||[]).reduce((s,b)=>s+(b.nights||0),0);
  const monthRevs=MONTHS.map((_,i)=>({m:MONTHS[i],rev:statements[i+1]?.rentalRevenue||0}));
  const maxRev=Math.max(...monthRevs.map(m=>m.rev),1);

  // ── Per-property stats from reservations listing field ─────────────────
  const propMap={};
  for(const r of reservations){
    const p=r.listing||'Unknown';
    if(!propMap[p]) propMap[p]={name:p,count:0,revenue:0};
    propMap[p].count++;
    propMap[p].revenue+=r.totalPrice||0;
  }
  // Add nights from statement bookings (keyed by guest listing)
  // Since statements don't always carry listing, derive nights per property
  // from reservations' numberOfNights
  for(const r of reservations){
    const p=r.listing||'Unknown';
    if(propMap[p]) propMap[p].nights=(propMap[p].nights||0)+(r.numberOfNights||0);
  }
  const props=Object.values(propMap).sort((a,b)=>b.count-a.count);
  const hasProps=props.length>1||(props.length===1&&props[0].name!=='Unknown'&&props[0].name!=='');
  const propList=hasProps?props:[];

  // Purchase reconciliation stats
  const totalPurchases=purchaseMatches.length;
  const matched=purchaseMatches.filter(m=>m.cc).length;
  const reconciled=purchaseMatches.filter(m=>m.reconciled).length;
  const unmatched=totalPurchases-matched;
  const totalSpend=purchaseMatches.reduce((s,m)=>s+m.purchase.amount,0);

  // ── Export to Excel ───────────────────────────────────────────────────────
  const exportToExcel = () => {
    // ── Style helpers ──────────────────────────────────────────────────────
    const S = {
      // Headers
      hdr:    {font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'center',vertical:'center'},border:{bottom:{style:'medium',color:{rgb:'FFFFFF'}}}},
      hdrAmt: {font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'right',vertical:'center'}},
      // Section headers (dark blue)
      sec:    {font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'2A3F6F'}},alignment:{vertical:'center'}},
      // Sub-section headers (medium blue)
      subsec: {font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'374785'}},alignment:{vertical:'center'}},
      // Summary rows (light navy bg)
      sumRow: {font:{bold:true,color:{rgb:'1B2A4A'},sz:10},fill:{fgColor:{rgb:'E8EDF7'}}},
      sumAmt: {font:{bold:true,color:{rgb:'1B2A4A'},sz:10},fill:{fgColor:{rgb:'E8EDF7'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00;($#,##0.00);-'},
      // Net profit positive
      profit: {font:{bold:true,color:{rgb:'2D7A4F'},sz:11},fill:{fgColor:{rgb:'E6F7EE'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00;($#,##0.00);-'},
      // Net loss
      loss:   {font:{bold:true,color:{rgb:'B93232'},sz:11},fill:{fgColor:{rgb:'FDEAEA'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00;($#,##0.00);-'},
      // Data cells
      txt:    {font:{sz:10},alignment:{vertical:'center'}},
      num:    {font:{sz:10},alignment:{horizontal:'right'},numFmt:'$#,##0.00;($#,##0.00);-'},
      numPos: {font:{color:{rgb:'2D7A4F'},sz:10},alignment:{horizontal:'right'},numFmt:'$#,##0.00;($#,##0.00);-'},
      numNeg: {font:{color:{rgb:'B93232'},sz:10},alignment:{horizontal:'right'},numFmt:'$#,##0.00;($#,##0.00);-'},
      numCtr: {font:{sz:10},alignment:{horizontal:'center'}},
      date:   {font:{sz:10},alignment:{horizontal:'center'},numFmt:'mm/dd/yyyy'},
      pct:    {font:{sz:10},alignment:{horizontal:'right'},numFmt:'0.0%'},
      // Alternating row
      alt:    {font:{sz:10},fill:{fgColor:{rgb:'F5F7FA'}}},
      altNum: {font:{sz:10},fill:{fgColor:{rgb:'F5F7FA'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00;($#,##0.00);-'},
      // Title
      title:  {font:{bold:true,color:{rgb:'1B2A4A'},sz:14}},
      sub:    {font:{color:{rgb:'6B7280'},sz:10}},
    };
    const cell=(v,s)=>({v,t:typeof v==='number'?'n':typeof v==='boolean'?'b':'s',s});
    const blank=s=>({v:'',t:'s',s});
    const mkSheet=(rows,cols)=>{
      const ws={'!cols':cols,'!rows':[]};
      rows.forEach((row,ri)=>{
        row.forEach((c,ci)=>{
          if(!c) return;
          const ref=XLSX.utils.encode_cell({r:ri,c:ci});
          ws[ref]=c;
        });
      });
      ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:rows.length-1,c:Math.max(...rows.map(r=>r.length))-1}});
      return ws;
    };
    const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const wb = XLSX.utils.book_new();

    // ══════════════════════════════════════════════════════════════════════════
    // SHEET 1: DASHBOARD
    // ══════════════════════════════════════════════════════════════════════════
    const stmts=Object.values(statements).filter(Boolean);
    const totalRev=stmts.reduce((s,m)=>s+(m.rentalRevenue||0),0);
    const totalPM=stmts.reduce((s,m)=>s+(m.pmCommission||0),0);
    const totalPayout=stmts.reduce((s,m)=>s+(m.ownerPayout||0),0);
    const totalExp=stmts.flatMap(m=>m.expenses||[]).reduce((s,e)=>s+(e.amount||0),0);
    const totalNights=stmts.flatMap(m=>m.bookings||[]).reduce((s,b)=>s+(b.nights||0),0);

    const dashRows=[
      [cell('RENTAL PROPERTY DASHBOARD — FY '+year,S.title)],
      [cell('Generated: '+new Date().toLocaleDateString(),S.sub)],
      [],
      [cell('KEY METRICS',S.sec),blank(S.sec),blank(S.sec),blank(S.sec),blank(S.sec)],
      [cell('Metric',S.hdr),cell('Value',S.hdrAmt)],
      [cell('Total Reservations',S.txt),cell(reservations.length,{...S.num,numFmt:'#,##0'})],
      [cell('Total Nights Booked',S.txt),cell(totalNights,{...S.num,numFmt:'#,##0'})],
      [cell('Gross Rental Revenue',S.txt),cell(totalRev,S.numPos)],
      [cell('PM Commission',S.txt),cell(-totalPM,S.numNeg)],
      [cell('Net Rental Revenue',S.sumRow),cell(totalRev-totalPM,S.sumAmt)],
      [cell('Operating Expenses',S.txt),cell(totalExp,S.numNeg)],
      [cell('Net Operating Income',S.sumRow),cell(totalRev-totalPM+totalExp,S.sumAmt)],
      [cell('Owner Payout',S.txt),cell(totalPayout,S.numPos)],
      [],
      [cell('MONTHLY REVENUE SUMMARY',S.sec),blank(S.sec),blank(S.sec)],
      [cell('Month',S.hdr),cell('Rental Revenue',S.hdrAmt),cell('PM Commission',S.hdrAmt),cell('Owner Payout',S.hdrAmt),cell('Statements',S.hdr)],
      ...MONTHS.map((m,i)=>{
        const s=statements[i+1];
        return [
          cell(m,i%2===0?S.txt:{...S.txt,...{fill:{fgColor:{rgb:'F5F7FA'}}}}),
          cell(s?(s.rentalRevenue||0):null,i%2===0?S.num:S.altNum),
          cell(s?(-(s.pmCommission||0)):null,i%2===0?S.num:S.altNum),
          cell(s?(s.ownerPayout||0):null,i%2===0?S.num:S.altNum),
          cell(s?'✓':'Missing',s?{...S.numCtr,font:{color:{rgb:'2D7A4F'},sz:10}}:{...S.numCtr,font:{color:{rgb:'B93232'},sz:10}}),
        ];
      }),
      [cell('TOTAL',S.sumRow),cell(totalRev,S.sumAmt),cell(-totalPM,S.sumAmt),cell(totalPayout,S.sumAmt),blank(S.sumRow)],
    ];
    XLSX.utils.book_append_sheet(wb, mkSheet(dashRows,[{wch:28},{wch:18},{wch:18},{wch:18},{wch:12}]),'Dashboard');

    // ══════════════════════════════════════════════════════════════════════════
    // SHEET 2: P&L REPORT
    // ══════════════════════════════════════════════════════════════════════════
    const EXP_CATS=['PM Monthly Service Fee','Maintenance & Construction','Pest Control','Landscaping',
      'Supplies \u2013 Household & Property','Supplies \u2013 Propane','Linen Service & Cleaning','Owner Stay \u2013 Cleaning Fee'];
    const catExpMap=desc=>{
      const d=(desc||'').toLowerCase();
      if(d.includes('monthly service fee')||d.includes('stocking')) return 'PM Monthly Service Fee';
      if(d.includes('maintenance')||d.includes('construction')||d.includes('repair')) return 'Maintenance & Construction';
      if(d.includes('pest')) return 'Pest Control';
      if(d.includes('landscap')||d.includes('weed')||d.includes('lawn')) return 'Landscaping';
      if(d.includes('propane')) return 'Supplies \u2013 Propane';
      if(d.includes('linen')||d.includes('laundry')) return 'Linen Service & Cleaning';
      if(d.includes('owner stay')) return 'Owner Stay \u2013 Cleaning Fee';
      return 'Supplies \u2013 Household & Property';
    };
    const ownerExpInPL=(ownerExpenses||[]).filter(e=>e.addedToPL);

    // Build P&L data
    const mRevs=MONTHS.map((_,i)=>statements[i+1]?(statements[i+1].rentalRevenue||0):null);
    const mPMs=MONTHS.map((_,i)=>statements[i+1]?-(statements[i+1].pmCommission||0):null);
    const mNet=MONTHS.map((_,i)=>(mRevs[i]!=null||mPMs[i]!=null)?(mRevs[i]||0)+(mPMs[i]||0):null);
    const mExpCats=EXP_CATS.map(cat=>MONTHS.map((_,i)=>{
      const s=statements[i+1]; if(!s) return null;
      const t=(s.expenses||[]).filter(e=>catExpMap(e.description)===cat).reduce((s,e)=>s+e.amount,0);
      return t||null;
    }));
    const mTotalExp=MONTHS.map((_,i)=>{
      const s=statements[i+1]; if(!s) return null;
      return (s.expenses||[]).reduce((s,e)=>s+e.amount,0)||null;
    });
    const mNOI=MONTHS.map((_,i)=>(mNet[i]!=null||mTotalExp[i]!=null)?(mNet[i]||0)+(mTotalExp[i]||0):null);
    const mPayout=MONTHS.map((_,i)=>statements[i+1]?(statements[i+1].ownerPayout||0):null);
    const ownerCats=[...new Set(ownerExpInPL.map(e=>e.category))].sort();
    const mOwnerExpCats=ownerCats.map(cat=>MONTHS.map((_,i)=>{
      const mo=String(i+1).padStart(2,'0');
      const t=ownerExpInPL.filter(e=>e.category===cat&&(e.date||'').slice(5,7)===mo).reduce((s,e)=>s+e.amount,0);
      return t||null;
    }));
    const mTotalOwnerExp=MONTHS.map((_,i)=>{
      const mo=String(i+1).padStart(2,'0');
      const t=ownerExpInPL.filter(e=>(e.date||'').slice(5,7)===mo).reduce((s,e)=>s+e.amount,0);
      return t||null;
    });
    const mPL=MONTHS.map((_,i)=>(mPayout[i]!=null||mTotalOwnerExp[i]!=null)?(mPayout[i]||0)+(mTotalOwnerExp[i]||0):null);

    const sum=arr=>arr.reduce((s,v)=>s+(v||0),0);
    const mCells=(arr,style,negStyle)=>arr.map((v,i)=>v!=null?cell(v,negStyle&&v<0?negStyle:style):blank({...style,font:{...style.font,color:{rgb:'CCCCCC'}}}));

    const plHdrCols=[cell('Line Item',S.hdr),...MONTHS.map(m=>cell(m,S.hdrAmt)),cell('Total',S.hdrAmt)];
    const plRow=(label,vals,style,negStyle,isSec)=>[
      cell(label,isSec?S.subsec:style===S.sumAmt?S.sumRow:S.txt),
      ...mCells(vals,style,negStyle),
      cell(sum(vals),style===S.sumAmt?S.sumAmt:negStyle&&sum(vals)<0?negStyle:style),
    ];

    const plRows=[
      [cell('P&L REPORT — FY '+year,S.title)],
      [cell('All Listings Combined',S.sub)],
      [],
      plHdrCols,
      [cell('REVENUE',S.sec),...Array(13).fill(blank(S.sec))],
      plRow('Gross Rental Revenue',mRevs,S.numPos,S.numNeg),
      plRow('PM Commission',mPMs,S.numNeg,S.numNeg),
      plRow('NET RENTAL REVENUE',mNet,S.sumAmt,S.sumAmt),
      [cell('MANAGEMENT & BOOKING FEES',S.sec),...Array(13).fill(blank(S.sec))],
      ...mExpCats.filter((_,i)=>mExpCats[i].some(v=>v!=null)).map((_,i2)=>{
        const idx=mExpCats.findIndex((v,j)=>j>=i2&&v.some(x=>x!=null));
        return plRow(EXP_CATS[idx]||'',mExpCats[idx]||[],S.numNeg);
      }).slice(0,EXP_CATS.length),
      plRow('TOTAL OPERATING EXPENSES',mTotalExp,S.sumAmt,S.sumAmt),
      plRow('NET OPERATING INCOME',mNOI,S.sumAmt,S.sumAmt),
      [cell('OWNER PAYOUT RECONCILIATION',S.sec),...Array(13).fill(blank(S.sec))],
      plRow('Owner Payout (statement verified)',mPayout,S.numPos),
      [cell('OWNER DIRECT EXPENSES',S.sec),...Array(13).fill(blank(S.sec))],
      ...ownerCats.map((_,i)=>plRow(ownerCats[i],mOwnerExpCats[i],S.numNeg)),
      plRow('TOTAL OWNER DIRECT EXPENSES',mTotalOwnerExp,S.sumAmt),
      mPL.some(v=>v!=null)?[
        cell(sum(mPL)>=0?'NET PROFIT':'NET LOSS',sum(mPL)>=0?{...S.sec,fill:{fgColor:{rgb:'2D7A4F'}}}:{...S.sec,fill:{fgColor:{rgb:'B93232'}}}),
        ...mPL.map(v=>v!=null?cell(v,v>=0?S.profit:S.loss):blank(S.txt)),
        cell(sum(mPL),sum(mPL)>=0?S.profit:S.loss),
      ]:[],
    ].filter(r=>r.length>0);

    // Fix the exp cats loop — simpler rebuild
    const plRowsFinal=[
      [cell('P&L REPORT — FY '+year,S.title)],
      [cell('All Listings Combined',S.sub)],
      [],
      plHdrCols,
      [cell('REVENUE',S.sec),...Array(13).fill(blank(S.sec))],
      [cell('Gross Rental Revenue',S.txt),...mCells(mRevs,S.numPos),cell(sum(mRevs),S.numPos)],
      [cell('PM Commission',S.txt),...mCells(mPMs,S.numNeg),cell(sum(mPMs),S.numNeg)],
      [cell('NET RENTAL REVENUE',S.sumRow),...mNet.map(v=>v!=null?cell(v,S.sumAmt):blank(S.sumAmt)),cell(sum(mNet),S.sumAmt)],
      [cell('OPERATING EXPENSES (Property Mgmt)',S.sec),...Array(13).fill(blank(S.sec))],
      ...EXP_CATS.map((cat,ci)=>{
        const vals=mExpCats[ci]; if(!vals||!vals.some(v=>v!=null)) return null;
        return [cell(cat,S.txt),...mCells(vals,S.numNeg),cell(sum(vals),S.numNeg)];
      }).filter(Boolean),
      [cell('TOTAL OPERATING EXPENSES',S.sumRow),...mTotalExp.map(v=>v!=null?cell(v,S.sumAmt):blank(S.sumAmt)),cell(sum(mTotalExp),S.sumAmt)],
      [cell('NET OPERATING INCOME',S.sumRow),...mNOI.map(v=>v!=null?cell(v,S.sumAmt):blank(S.sumAmt)),cell(sum(mNOI),S.sumAmt)],
      [cell('OWNER PAYOUT RECONCILIATION',S.sec),...Array(13).fill(blank(S.sec))],
      [cell('Owner Payout (statement verified)',S.txt),...mCells(mPayout,S.numPos),cell(sum(mPayout),S.numPos)],
      ownerCats.length?[cell('OWNER DIRECT EXPENSES',S.sec),...Array(13).fill(blank(S.sec))]:null,
      ...ownerCats.map((cat,ci)=>[cell(cat,S.txt),...mCells(mOwnerExpCats[ci],S.numNeg),cell(sum(mOwnerExpCats[ci]),S.numNeg)]),
      ownerCats.length?[cell('TOTAL OWNER DIRECT EXPENSES',S.sumRow),...mTotalOwnerExp.map(v=>v!=null?cell(v,S.sumAmt):blank(S.sumAmt)),cell(sum(mTotalOwnerExp),S.sumAmt)]:null,
      (()=>{const t=sum(mPL);const sty=t>=0?S.profit:S.loss;return[cell(t>=0?'\u25b2  NET PROFIT':'\u25bc  NET LOSS',t>=0?{...S.sec,fill:{fgColor:{rgb:'2D7A4F'}}}:{...S.sec,fill:{fgColor:{rgb:'B93232'}}}), ...mPL.map(v=>v!=null?cell(v,sty):blank(sty)),cell(t,sty)];})(),
    ].filter(Boolean);

    const plColWidths=[{wch:34},...Array(12).fill({wch:11}),{wch:12}];
    XLSX.utils.book_append_sheet(wb,mkSheet(plRowsFinal,plColWidths),'P&L Report');

    // ══════════════════════════════════════════════════════════════════════════
    // SHEET 3: RESERVATIONS
    // ══════════════════════════════════════════════════════════════════════════
    if(reservations.length){
      const resHdr=[cell('First Name',S.hdr),cell('Last Name',S.hdr),cell('Check-in',S.hdr),cell('Check-out',S.hdr),cell('Nights',S.hdr),cell('Guests',S.hdr),cell('Channel',S.hdr),cell('Listing',S.hdr),cell('Total Price',S.hdrAmt),cell('Status',S.hdr)];

    // ══════════════════════════════════════════════════════════════════════════
    // SHEET 4: STATEMENT BOOKINGS
    // ══════════════════════════════════════════════════════════════════════════
    const allBookings=Object.values(statements).filter(Boolean).flatMap(s=>(s.bookings||[]).map(b=>({...b,_month:s.month})));
    if(allBookings.length){
      const bHdr=[cell('Month',S.hdr),cell('Check-in',S.hdr),cell('Guest',S.hdr),cell('Listing',S.hdr),cell('Nights',S.hdr),cell('Channel',S.hdr),cell('Total Payout',S.hdrAmt),cell('Rental Revenue',S.hdrAmt),cell('PM Commission',S.hdrAmt),cell('Owner Payout',S.hdrAmt)];

    if(purchaseMatches.length){

        ];

      XLSX.utils.book_append_sheet(wb,mkSheet([prHdr,...prData],[{wch:14},{wch:34},{wch:12},{wch:28},{wch:12},{wch:8},{wch:22},{wch:32},{wch:12}]),'Purchase Reconciliation');
    }

    XLSX.writeFile(wb,'rental_data_FY'+year+'.xlsx',{cellStyles:true,bookType:'xlsx'});
  };

  return h('div',null,
    h(SectionHeader,{title:'Dashboard — FY '+year,

              const blob=new Blob([bytes],{type:'application/json'});

              const a=document.createElement('a');
              a.href=url;a.download='rental_data_FY'+year+'.json';
              document.body.appendChild(a);a.click();
              setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
            }catch(err){
              // Fallback: open in new tab so user can save manually

              if(w){w.document.write('<pre>'+json.replace(/</g,'&lt;')+'</pre>');w.document.title='rental_data_FY'+year+'.json';}
            }
          },
          style:{padding:'7px 16px',borderRadius:7,fontFamily:font,fontSize:12,fontWeight:600,

          h(Icon,{d:IC.download,size:13,color:T.textSub}),'Export Data JSON'),
        h('button',{onClick:exportToExcel,
          style:{padding:'7px 16px',borderRadius:7,fontFamily:font,fontSize:12,fontWeight:600,
            cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,
            background:T.teal,color:T.white,border:'none'}},
          h(Icon,{d:IC.download,size:13,color:T.white}),'Export FY'+year+' to Excel'))}),

    // ── Row 1: 5 top-level KPI cards ──────────────────────────────────────
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:20}},
      h(StatCard,{label:'Total Reservations',value:reservations.length,icon:IC.list,accent:T.navy}),
      h(StatCard,{label:'Total Nights',value:totalNights||'—',icon:IC.home,accent:T.blue}),
      h(StatCard,{label:'Gross Revenue',value:fmt$(totalRev),icon:IC.dollar,accent:T.teal}),
      h(StatCard,{label:'Owner Payout',value:fmt$(totalPayout),icon:IC.chart,accent:T.green}),
      h(StatCard,{label:'Operating Expenses',value:fmt$(Math.abs(totalExp)),icon:IC.alert,accent:T.amber})),

    // ── Purchase Reconciliation Tiles ──────────────────────────────────────
    totalPurchases>0&&h('div',{style:{marginBottom:20}},
      h('div',{style:{fontSize:12,fontWeight:700,color:T.textSub,fontFamily:font,
        letterSpacing:0.6,marginBottom:10,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}},
        'Purchase Reconciliation',
        h('button',{onClick:()=>setPage('ownerexp'),style:{fontSize:11,fontWeight:600,color:T.navy,

          'Go to Reconciliation →')),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}},
        h(StatCard,{label:'Total Purchases',value:totalPurchases,icon:IC.list,accent:T.navy}),
        h(StatCard,{label:'Matched',value:matched,icon:IC.check,accent:T.teal,sub:totalPurchases>0?Math.round(matched/totalPurchases*100)+'%':null}),
        h(StatCard,{label:'Unmatched',value:unmatched,icon:IC.alert,accent:T.red,sub:unmatched>0?'Need review':null}),
        h(StatCard,{label:'Reconciled',value:reconciled,icon:IC.check,accent:T.green,sub:matched>0?Math.round(reconciled/matched*100)+'% of matched':null}),
        h(StatCard,{label:'Total Spend',value:fmt$(totalSpend),icon:IC.dollar,accent:T.amber}))),

    // ── Row 2: Per-property breakdown (only if multi-property data) ────────
    propList.length>0&&h('div',{style:{marginBottom:20}},
      h('div',{style:{fontSize:12,fontWeight:700,color:T.textSub,fontFamily:font,
        letterSpacing:0.6,marginBottom:10,textTransform:'uppercase'}},'By Property'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat('+Math.min(propList.length,4)+',1fr)',gap:12}},
        propList.map((p,pi)=>{
          const color=PROP_COLORS[pi%PROP_COLORS.length];
          const pct=reservations.length>0?Math.round(p.count/reservations.length*100):0;
          const avgNightly=p.nights>0?p.revenue/p.nights:0;
          return h('div',{key:p.name,style:{background:T.white,border:'1px solid '+T.border,
            borderRadius:10,padding:'16px 20px',borderLeft:'4px solid '+color}},
            h('div',{style:{fontSize:12,fontWeight:700,color,fontFamily:font,marginBottom:12,
              whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},p.name),
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px'}},
              [
                {label:'Reservations',val:p.count+' ('+pct+'%)'},
                {label:'Nights Booked',val:p.nights||'—'},
                {label:'Total Revenue',val:fmt$(p.revenue)},
                {label:'Avg / Night',val:avgNightly>0?fmt$(avgNightly):'—'},
              ].map(({label,val},j)=>h('div',{key:j},
                h('div',{style:{fontSize:10,color:T.textSub,fontFamily:font,marginBottom:2}},label),
                h('div',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font}},val)))));
        }))),

    // ── Row 3: Monthly bar chart + Financial summary ───────────────────────
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}},
      h('div',{style:{background:T.white,border:'1px solid '+T.border,borderRadius:10,padding:'20px 24px'}},
        h('div',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font,marginBottom:16}},'Monthly Revenue'),
        h('div',{style:{display:'flex',alignItems:'flex-end',gap:4,height:120}},
          monthRevs.map(m=>h('div',{key:m.m,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}},
            h('div',{style:{width:'100%',background:m.rev>0?T.navy:T.gray2,
              height:m.rev>0?Math.max(4,(m.rev/maxRev)*100):4,borderRadius:'3px 3px 0 0'}}),
            h('div',{style:{fontSize:9,color:T.textSub,fontFamily:font}},m.m))))),
      h('div',{style:{background:T.white,border:'1px solid '+T.border,borderRadius:10,padding:'20px 24px'}},
        h('div',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font,marginBottom:12}},'Financial Summary'),
        [{label:'Gross Rental Revenue',value:fmt$(totalRev),color:T.teal},
         {label:'PM Commission',value:'('+fmt$(totalPM)+')',color:T.red},
         {label:'Net Rental Revenue',value:fmt$(totalRev-totalPM),color:T.navy,bold:true},
         {label:'Operating Expenses',value:'('+fmt$(Math.abs(totalExp))+')',color:T.amber},
         {label:'Net Operating Income',value:fmt$(totalRev-totalPM+totalExp),color:T.green,bold:true},
        ].map((row,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',

    // ── Row 4: Reservations donut-style split + Statement status ──────────

        h('div',{style:{display:'flex',flexDirection:'column',gap:10}},

              h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
                h('span',{style:{fontSize:12,color:T.text,fontFamily:font,fontWeight:500,
                  maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
                h('span',{style:{fontSize:12,color:T.textSub,fontFamily:font}},p.count+' ('+Math.round(pct)+'%)')),
              h('div',{style:{height:8,background:T.gray1,borderRadius:4,overflow:'hidden'}},
                h('div',{style:{width:pct+'%',height:'100%',background:color,borderRadius:4,minWidth:pct>0?4:0}})));
          }))),
      h('div',{style:{background:T.white,border:'1px solid '+T.border,borderRadius:10,padding:'20px 24px'}},
        h('div',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font,marginBottom:12}},'Statement Upload Status'),
