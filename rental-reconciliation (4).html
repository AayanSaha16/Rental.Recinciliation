                has?h(Icon,{d:IC.check,size:12,color:T.teal}):h(Icon,{d:IC.x,size:10,color:T.red})),
              h('div',{style:{fontSize:9,color:T.textSub,fontFamily:font,marginTop:3}},m));
          })))));
};

// ── Reservations ──────────────────────────────────────────────────────────────
const ReservationsPage = ({reservations,setReservations,readyForAnalysis,setReadyForAnalysis}) => {
  const [selected,setSelected]=useState(new Set());
  const [filter,setFilter]=useState('all');
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null);

  const handleUpload = async files => {
    setLoading(true); setReadyForAnalysis(false);
    try {
      const parsed=await parseReservationFile(files[0]);
      setReservations(prev=>{
        const existing=new Set(prev.map(r=>normStr(r.firstName)+'-'+normStr(r.lastName)+'-'+r.checkInDate));
        const fresh=parsed.filter(r=>!existing.has(normStr(r.firstName)+'-'+normStr(r.lastName)+'-'+r.checkInDate));
        return [...prev,...fresh];
      });
      setMsg({type:'success',text:'Loaded '+parsed.length+' reservations'});
    } catch(e){setMsg({type:'error',text:'Failed to parse: '+e.message});}
    setLoading(false);
  };

  const filtered=useMemo(()=>filter==='all'?reservations:reservations.filter(r=>normStr(r.status)===filter),[reservations,filter]);
  const allFilteredIds=useMemo(()=>new Set(filtered.map(r=>r.id)),[filtered]);
  const allSelected=filtered.length>0&&filtered.every(r=>selected.has(r.id));

  const toggleSel=id=>setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const selectAll=()=>{
    if(allSelected){setSelected(prev=>{const s=new Set(prev);allFilteredIds.forEach(id=>s.delete(id));return s;});}
    else{setSelected(prev=>{const s=new Set(prev);allFilteredIds.forEach(id=>s.add(id));return s;});}
  };
  const delSelected=()=>{
    const count=selected.size;
    setReservations(prev=>prev.filter(r=>!selected.has(r.id)));
    setSelected(new Set()); setReadyForAnalysis(false);
    setMsg({type:'success',text:'Deleted '+count+' reservation'+(count!==1?'s':'')});
  };
  const autoPurge=()=>{
    setReservations(prev=>prev.filter(r=>!['cancelled','inquiry'].includes(normStr(r.status))));
    setSelected(new Set()); setReadyForAnalysis(false);
    setMsg({type:'success',text:'Removed cancelled/inquiry rows'});
  };
  const markReady=()=>{setReadyForAnalysis(true);setMsg({type:'success',text:reservations.length+' reservations marked as ready for analysis'});};

  const cols=[
    {key:'_guest',label:'Guest',render:(_,r)=>h('span',{className:'cell-guest',title:(r.firstName+' '+r.lastName).trim()},(r.firstName+' '+r.lastName).trim())},
    {key:'checkInDate',label:'Check-in',render:fmtDate},{key:'checkOutDate',label:'Check-out',render:fmtDate},
    {key:'channel',label:'Channel',render:v=>h(Badge,{label:v,color:T.navy,bg:T.blueLight})},
    {key:'totalPrice',label:'Total Price',align:'right',render:fmt$},
    {key:'numberOfNights',label:'Nights',align:'center'},{key:'numberOfGuests',label:'Guests',align:'center'},
    {key:'status',label:'Status',render:v=>{
      const cfg={new:[T.green,T.greenLight],modified:[T.blue,T.blueLight],cancelled:[T.red,T.redLight],inquiry:[T.amber,T.amberLight]};
      const [c,bg]=cfg[normStr(v)]||[T.textSub,T.gray1];
      return h(Badge,{label:v,color:c,bg});
    }},
    {key:'listing',label:'Listing'},
  ];

  // Pre-compute listing summary
  const listingGroups={};
  reservations.forEach(r=>{
    const l=r.listing||'Unknown';
    if(!listingGroups[l]) listingGroups[l]={count:0,nights:0,revenue:0};
    listingGroups[l].count++;
    listingGroups[l].nights+=r.numberOfNights||0;
    listingGroups[l].revenue+=r.totalPrice||0;
  });
  const listingRows=Object.entries(listingGroups).sort((a,b)=>b[1].count-a[1].count);
  const listingTotals=listingRows.reduce((s,[,v])=>({count:s.count+v.count,nights:s.nights+v.nights,revenue:s.revenue+v.revenue}),{count:0,nights:0,revenue:0});
  const reservationSummaryEl=reservations.length>0?h('div',{style:{marginTop:16,background:T.white,border:'1px solid '+T.border,borderRadius:10,overflow:'hidden'}},
    h('div',{style:{padding:'10px 16px',background:T.navy}},
      h('span',{style:{fontSize:12,fontWeight:700,color:T.white,fontFamily:font}},'Summary by Listing')),
    h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:font}},
      h('thead',null,
        h('tr',{style:{background:T.gray0,borderBottom:'2px solid '+T.border}},
          ['Listing','Reservations','Nights','Avg Nights','Total Revenue'].map(function(col){
            return h('th',{key:col,style:{padding:'8px 16px',textAlign:col==='Listing'?'left':'right',
              fontSize:11,fontWeight:600,color:T.textSub,whiteSpace:'nowrap'}},col);
          }))),
      h('tbody',null,
        listingRows.map(function(entry,i){
          var listing=entry[0], v=entry[1];
          return h('tr',{key:listing,style:{borderBottom:'1px solid '+T.border,background:i%2===0?T.white:T.gray0}},
            h('td',{style:{padding:'8px 16px'}},h(Badge,{label:listing,color:listing&&listing.toLowerCase().includes('green meadows')?'#155724':listing&&listing.toLowerCase().includes('cherry cottage')?'#7A3200':T.navy,bg:listing&&listing.toLowerCase().includes('green meadows')?'#D4EDDA':listing&&listing.toLowerCase().includes('cherry cottage')?'#FFE5CC':T.blueLight})),
            h('td',{style:{padding:'8px 16px',textAlign:'right',fontWeight:600}},v.count),
            h('td',{style:{padding:'8px 16px',textAlign:'right',fontWeight:600}},v.nights),
            h('td',{style:{padding:'8px 16px',textAlign:'right',color:T.textSub}},v.count>0?(v.nights/v.count).toFixed(1):'-'),
            h('td',{style:{padding:'8px 16px',textAlign:'right',fontWeight:600,color:T.teal}},fmt$(v.revenue)));
        }).concat([
          h('tr',{key:'__total',style:{borderTop:'2px solid '+T.border,background:T.gray0}},
            h('td',{style:{padding:'8px 16px',fontWeight:700}},'Total'),
            h('td',{style:{padding:'8px 16px',textAlign:'right',fontWeight:700}},listingTotals.count),
            h('td',{style:{padding:'8px 16px',textAlign:'right',fontWeight:700}},listingTotals.nights),
            h('td',{style:{padding:'8px 16px',textAlign:'right',color:T.textSub}},listingTotals.count>0?(listingTotals.nights/listingTotals.count).toFixed(1):'-'),
            h('td',{style:{padding:'8px 16px',textAlign:'right',fontWeight:700,color:T.teal}},fmt$(listingTotals.revenue)))
        ])))):null;

  return h('div',null,
    h(SectionHeader,{title:'Reservations',
      sub:readyForAnalysis
        ?h('span',{style:{color:T.green,fontWeight:600,display:'inline-flex',alignItems:'center',gap:6}},
            h(Icon,{d:IC.check,size:13,color:T.green}),reservations.length+' reservations — ready for analysis')
        :reservations.length+' total reservations',
      actions:h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
        h('label',{style:{padding:'6px 14px',borderRadius:7,fontFamily:font,fontSize:12,fontWeight:600,
          cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,
          border:'1px solid '+T.border,background:T.white,color:T.textSub}},
          h('input',{type:'file',accept:'.xlsx,.csv',style:{display:'none'},
            onChange:e=>e.target.files[0]&&handleUpload([e.target.files[0]])}),
          h(Icon,{d:IC.upload,size:13,color:T.textSub}),
          reservations.length?'Upload More':'Upload File'),
        h(Btn,{variant:'secondary',icon:'trash',size:'sm',onClick:autoPurge,disabled:!reservations.length},'Remove Cancelled'),
        selected.size>0&&h(Btn,{variant:'danger',icon:'trash',size:'sm',onClick:delSelected},'Delete ('+selected.size+')'),
        reservations.length>0&&h('button',{
          onClick:readyForAnalysis?()=>{setReadyForAnalysis(false);setMsg(null);}:markReady,
          style:{padding:'6px 14px',borderRadius:7,fontFamily:font,fontSize:12,fontWeight:600,cursor:'pointer',
            display:'inline-flex',alignItems:'center',gap:6,transition:'all 0.15s',
            border:readyForAnalysis?'1px solid '+T.green+'50':'1px solid '+T.navy,
            background:readyForAnalysis?T.greenLight:T.navy,color:readyForAnalysis?T.green:T.white}},
          h(Icon,{d:IC.check,size:13,color:'currentColor'}),
          readyForAnalysis?'Ready for Analysis':'Mark Ready for Analysis'))}),
    h(AlertBanner,{msg,onClose:()=>setMsg(null)}),
    !reservations.length
      ?h('div',{style:{textAlign:'center',padding:'48px 24px',color:T.textSub,fontFamily:font,
          fontSize:13,background:T.gray0,borderRadius:10,border:'2px dashed '+T.border}},
          h('label',{style:{cursor:'pointer',display:'inline-flex',flexDirection:'column',alignItems:'center',gap:10}},
            h('input',{type:'file',accept:'.xlsx,.csv',style:{display:'none'},onChange:e=>e.target.files[0]&&handleUpload([e.target.files[0]])}),
            h(Icon,{d:IC.upload,size:32,color:T.gray3}),
            h('div',{style:{fontSize:14,fontWeight:600,color:T.text}},'Upload Reservation File'),
            h('div',{style:{fontSize:12,color:T.textSub}},'CSV or Excel from HostAway')))
      :h('div',null,
          h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:12,flexWrap:'wrap'}},
            h('button',{onClick:selectAll,style:{padding:'5px 12px',borderRadius:6,fontSize:12,fontFamily:font,fontWeight:500,cursor:'pointer',
              border:'1px solid '+(allSelected?T.navy:T.border),background:allSelected?T.blueLight:T.white,
              color:allSelected?T.navy:T.textSub,display:'inline-flex',alignItems:'center',gap:6}},
              h('input',{type:'checkbox',checked:allSelected,readOnly:true,style:{width:13,height:13,margin:0,pointerEvents:'none',accentColor:T.navy}}),
              allSelected?'Deselect All ('+filtered.length+')':'Select All ('+filtered.length+')'),
            h('div',{style:{width:1,height:20,background:T.border,flexShrink:0}}),
            ['all','new','modified','cancelled','inquiry'].map(s=>
              h('button',{key:s,onClick:()=>{setFilter(s);setSelected(new Set());},style:{
                padding:'5px 12px',borderRadius:6,fontSize:12,fontFamily:font,fontWeight:500,cursor:'pointer',
                border:'1px solid '+(filter===s?T.navy:T.border),
                background:filter===s?T.navy:T.white,color:filter===s?T.white:T.textSub}},
                s==='all'?'All ('+reservations.length+')':s.charAt(0).toUpperCase()+s.slice(1)))),
          loading&&h('div',{style:{textAlign:'center',padding:24,color:T.textSub,fontFamily:font}},'Processing…'),
          h(Table,{cols,rows:filtered,selected,onSelect:toggleSel,onSelectAll:selectAll,allSelected}),

          // ── Summary by listing ──────────────────────────────────────────
          reservationSummaryEl));
};

// ── Owner Statements ──────────────────────────────────────────────────────────
const StatementsPage = ({statements,setStatements,activeYear=2025,availableYears=[2025],setActiveYear}) => {
  const [activeMonth,setActiveMonth]=useState(1);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null);
  const [sortBookings,setSortBookings]=useState('date'); // 'date' | 'guest' | 'payout'

  // Merge two statements for the same month (e.g. Cherry Cottage + Green Meadows)
  // Deduplicates by guest+checkInDate — same record uploaded twice gets overwritten, not doubled
  const mergeStmts = (a, b) => {
    const existing = new Map((a.bookings||[]).map(bk=>[normStr(bk.guest)+'|'+bk.checkInDate, bk]));
    // Overwrite existing with b's version if same key, otherwise add new
    for(const bk of (b.bookings||[])){
      existing.set(normStr(bk.guest)+'|'+bk.checkInDate, bk);
    }
    const mergedBookings = [...existing.values()];

    const existingExp = new Set((a.expenses||[]).map(e=>e.date+'|'+normStr(e.description)+'|'+e.amount));
    const newExpenses = (b.expenses||[]).filter(e=>!existingExp.has(e.date+'|'+normStr(e.description)+'|'+e.amount));

    const bookings = mergedBookings;
    return {
      ...a,
      bookings,
      expenses: [...(a.expenses||[]), ...newExpenses],
      rentalRevenue: bookings.reduce((s,bk)=>s+(bk.rentalRevenue||0),0),
      pmCommission:  bookings.reduce((s,bk)=>s+(bk.pmCommission||0),0),
      ownerPayout:   bookings.reduce((s,bk)=>s+(bk.ownerPayout||0),0),
    };
  };

  // Process multiple files — auto-detect month, MERGE if same month
  const handleUpload = async files => {
    setLoading(true);
    const results=[]; const newStmts={}; let errors=0;
    for(const file of files){
      try {
        const parsed=await parseStatementFile(file, activeMonth);
        const stmts=Array.isArray(parsed)?parsed:[parsed];
        for(const stmt of stmts){
          const month=stmt.month||activeMonth;
          // Merge with existing entry for this month instead of overwriting
          newStmts[month] = newStmts[month] ? mergeStmts(newStmts[month], stmt) : stmt;
          results.push(MONTH_FULL[month-1]);
        }
      } catch(e){ errors++; console.error('Parse error:',e); }
    }
    if(Object.keys(newStmts).length>0){
      // Also merge with any already-saved statements for these months
      setStatements(prev=>{
        const merged={...prev};
        for(const [m,s] of Object.entries(newStmts)){
          merged[m] = prev[m] ? mergeStmts(prev[m], s) : s;
        }
        return merged;
      });
    }
    if(results.length>0 && errors===0)
      setMsg({type:'success',text:'Loaded '+results.length+' statement'+(results.length>1?'s':'')+': '+[...new Set(results)].join(', ')});
    else if(results.length>0 && errors>0)
      setMsg({type:'success',text:'Loaded '+results.length+' statement'+(results.length>1?'s':'')+': '+[...new Set(results)].join(', ')+('; '+errors+' failed')});
    else if(errors>0)
      setMsg({type:'error',text:errors+' file'+(errors>1?'s':'')+' failed to parse — check they are owner statement Excel files'});
    setLoading(false);
  };

  const stmt=statements[activeMonth];

  // Sortable bookings
  const sortedBookings=useMemo(()=>{
    if(!stmt) return [];
    const rows=[...(stmt.bookings||[])];
    if(sortBookings==='guest') rows.sort((a,b)=>String(a.guest||'').localeCompare(String(b.guest||'')));
    else if(sortBookings==='payout') rows.sort((a,b)=>(b.ownerPayout||0)-(a.ownerPayout||0));
    else rows.sort((a,b)=>new Date(a.checkInDate||0)-new Date(b.checkInDate||0));
    return rows;
  },[stmt,sortBookings]);

  const hasTotalPayout = true; // always show Total Payout column
  const bCols=[
    {key:'checkInDate',label:'Check-in',render:fmtDate},
    {key:'guest',label:'Guest',render:v=>h('span',{className:'cell-guest',title:v||''},v||'—')},
    {key:'listing',label:'Listing',render:v=>{ const lc=(v||'').toLowerCase(); const isGM=lc.includes('green meadows'); const isCC=lc.includes('cherry cottage'); const bg=isGM?'#D4EDDA':isCC?'#FFE5CC':T.blueLight; const color=isGM?'#155724':isCC?'#7A3200':T.navy; return v?h(Badge,{label:v,color,bg}):null; }},
    {key:'nights',label:'Nights',align:'center'},
    {key:'channel',label:'Channel',render:v=>h(Badge,{label:v,color:T.navy,bg:T.blueLight})},
    ...(hasTotalPayout?[{key:'totalPayout',label:'Total Payout',align:'right',render:v=>v>0?fmt$(v):h('span',{style:{color:T.gray3}},'—'),cellStyle:()=>({fontWeight:600,color:T.navy})}]:[]),
    {key:'rentalRevenue',label:'Rental Revenue',align:'right',render:v=>v>0?fmt$(v):h('span',{style:{color:T.gray3}},'—'),cellStyle:()=>({fontWeight:600,color:T.text})},
    {key:'pmCommission',label:'PM Commission',align:'right',render:fmt$,cellStyle:()=>({color:T.red})},
    {key:'ownerPayout',label:'Owner Payout',align:'right',render:fmt$,cellStyle:()=>({color:T.green,fontWeight:600})},
  ];
  const eCols=[
    {key:'date',label:'Date',render:fmtDate},
    {key:'listing',label:'Listing',render:v=>{ const lc=(v||'').toLowerCase(); const isGM=lc.includes('green meadows'); const isCC=lc.includes('cherry cottage'); const bg=isGM?'#D4EDDA':isCC?'#FFE5CC':T.blueLight; const color=isGM?'#155724':isCC?'#7A3200':T.navy; return v?h(Badge,{label:v,color,bg}):h('span',{style:{color:T.gray3,fontSize:11}},'—'); }},
    {key:'category',label:'Category'},
    {key:'description',label:'Description'},
    {key:'amount',label:'Amount',align:'right',render:fmt$,cellStyle:row=>({color:row.amount<0?T.red:T.green})},
  ];

  const uploadedCount=Object.values(statements).filter(Boolean).length;

  return h('div',null,
    h(SectionHeader,{title:'Owner Statements',
      sub:uploadedCount>0?uploadedCount+'/12 months uploaded — click any month tab to view':'Upload monthly owner statements below',
      actions:h('label',{style:{padding:'6px 14px',borderRadius:7,fontFamily:font,fontSize:12,fontWeight:600,
        cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,
        border:'1px solid '+T.border,background:T.white,color:T.textSub}},
        h('input',{type:'file',multiple:true,accept:'.xlsx,.csv',style:{display:'none'},
          onChange:e=>e.target.files.length&&handleUpload(Array.from(e.target.files))}),
        h(Icon,{d:IC.upload,size:13,color:T.textSub}),
        uploadedCount>0?'Upload More':'Upload Statements')}),
    h(AlertBanner,{msg,onClose:()=>setMsg(null)}),

    // Year + Month tabs on same line
    h('div',{style:{display:'flex',alignItems:'flex-end',gap:0,marginBottom:20,borderBottom:'1px solid '+T.border,overflowX:'auto'}},
      // Year pills on the left
      availableYears&&availableYears.length>1&&h('div',{style:{display:'flex',gap:3,alignItems:'center',paddingBottom:6,paddingRight:12,borderRight:'1px solid '+T.border,marginRight:8,flexShrink:0}},
        h('span',{style:{fontSize:10,color:T.textSub,fontFamily:font,fontWeight:600,marginRight:2}},'FY'),
        availableYears.map(yr=>
          h('button',{key:yr,onClick:()=>setActiveYear&&setActiveYear(yr),style:{
            padding:'4px 10px',border:'1px solid '+(yr===activeYear?T.navy:T.border),
            borderRadius:6,fontFamily:font,fontSize:11,fontWeight:yr===activeYear?700:500,
            cursor:'pointer',background:yr===activeYear?T.navy:T.white,
            color:yr===activeYear?T.white:T.textSub,flexShrink:0}},
            yr))),
      // Month tabs
      MONTHS.map((m,i)=>{
        const has=!!statements[i+1];
        const active=activeMonth===i+1;
        return h('button',{key:m,onClick:()=>setActiveMonth(i+1),style:{
          padding:'8px 14px',border:'none',borderRadius:'6px 6px 0 0',fontFamily:font,fontSize:12,
          fontWeight:active?700:500,cursor:'pointer',background:active?T.white:'transparent',
          color:active?T.navy:has?T.teal:T.red,
          borderBottom:active?'2px solid '+T.navy:'2px solid transparent',
          display:'flex',alignItems:'center',gap:4,flexShrink:0}},
          m,
          h('div',{style:{width:6,height:6,borderRadius:3,background:has?T.teal:T.red,opacity:active?1:0.6}}));
      })),

    !stmt
      ?h('div',null,
          loading
            ?h('div',{style:{textAlign:'center',padding:48,color:T.textSub,fontFamily:font,display:'flex',alignItems:'center',justifyContent:'center',gap:10}},
                h('div',{style:{width:16,height:16,border:'2px solid '+T.border,borderTopColor:T.blue,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
                'Processing files…')
            :h('div',{style:{textAlign:'center',padding:'48px 24px',background:T.redLight,
                borderRadius:10,border:'1px solid '+T.red+'30'}},
                h(Icon,{d:IC.alert,size:28,color:T.red,style:{margin:'0 auto 12px',display:'block'}}),
                h('div',{style:{fontSize:14,fontWeight:600,color:T.red,fontFamily:font,marginBottom:6}},'No statement for '+MONTH_FULL[activeMonth-1]),
                h('div',{style:{fontSize:12,color:T.red,fontFamily:font,opacity:0.8}},'Drop files in the upload area above — month is detected automatically')))
      :h('div',null,
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:20}},
            h(StatCard,{label:'Bookings',value:sortedBookings.length,accent:T.navy,icon:IC.list}),
            h(StatCard,{label:'Nights',value:sortedBookings.reduce((s,b)=>s+(b.nights||0),0),accent:T.blue,icon:IC.home}),
            h(StatCard,{label:'Rental Revenue',value:fmt$(sortedBookings.reduce((s,b)=>s+(b.rentalRevenue||0),0)||stmt.rentalRevenue),accent:T.teal,icon:IC.dollar}),
            h(StatCard,{label:'PM Commission',value:(()=>{const pm=sortedBookings.reduce((s,b)=>s+(b.pmCommission||0),0)||stmt.pmCommission;const rv=sortedBookings.reduce((s,b)=>s+(b.rentalRevenue||0),0)||stmt.rentalRevenue;return fmt$(pm)+(rv>0?' ('+((pm/rv)*100).toFixed(1)+'%)':'');})(),accent:T.red,icon:IC.chart}),
            h(StatCard,{label:'Owner Payout',value:fmt$(sortedBookings.reduce((s,b)=>s+(b.ownerPayout||0),0)||stmt.ownerPayout),accent:T.green,icon:IC.dollar})),

          // Warn if listing field is missing (stale data — needs re-upload)
          sortedBookings.length>0&&sortedBookings.every(b=>!b.listing)&&h('div',{
            style:{padding:'10px 14px',borderRadius:8,marginBottom:12,fontSize:12,
              background:T.amberLight,border:'1px solid '+T.amber+'40',
              color:T.amber,fontFamily:font,display:'flex',alignItems:'center',gap:8}},
            h(Icon,{d:IC.alert,size:14,color:T.amber}),
            'Listing column is blank — this statement was parsed with an older version. ',
            h('strong',null,'Remove and re-upload this file'),
            ' to see listing names.'),
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}},
            h('div',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font}},'Rental Activity — '+(stmt.bookings||[]).length+' bookings'),
            h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
              h('span',{style:{fontSize:11,color:T.textSub,fontFamily:font}},'Sort:'),
              ['date','guest','payout'].map(s=>
                h('button',{key:s,onClick:()=>setSortBookings(s),style:{padding:'4px 10px',borderRadius:5,fontSize:11,
                  fontFamily:font,fontWeight:500,cursor:'pointer',
                  border:'1px solid '+(sortBookings===s?T.navy:T.border),
                  background:sortBookings===s?T.navy:T.white,
                  color:sortBookings===s?T.white:T.textSub}},
                  s==='date'?'Date':s==='guest'?'Guest Name':'Owner Payout')),
              h(Btn,{variant:'secondary',size:'sm',icon:'upload',onClick:()=>setStatements(prev=>({...prev,[activeMonth]:null}))},'Remove'))),
          h(Table,{cols:bCols,rows:sortedBookings.map((b,i)=>({...b,id:'b'+i}))}),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat('+(hasTotalPayout?4:3)+',1fr)',gap:8,marginTop:12,
            padding:'12px 16px',background:T.gray0,borderRadius:8,border:'1px solid '+T.border}},
            [
              ...(hasTotalPayout?[{label:'Total Payout',val:(sortedBookings||[]).reduce((s,b)=>s+(b.totalPayout||0),0),color:T.navy,bold:true}]:[]),
              {label:'Total Rental Revenue',val:(sortedBookings||[]).reduce((s,b)=>s+(b.rentalRevenue||0),0),color:T.teal,bold:true},
              {label:'Total PM Commission',val:(sortedBookings||[]).reduce((s,b)=>s+(b.pmCommission||0),0),color:T.red},
              {label:'Total Owner Payout',val:(sortedBookings||[]).reduce((s,b)=>s+(b.ownerPayout||0),0),color:T.green,bold:true},
            ].map(({label,val,color,bold})=>h('div',{key:label,style:{textAlign:'center'}},
              h('div',{style:{fontSize:10,color:T.textSub,fontFamily:font,marginBottom:3}},label),
              h('div',{style:{fontSize:14,fontWeight:bold?700:600,color,fontFamily:font}},fmt$(val))))),
          (stmt.expenses||[]).length>0&&h('div',{style:{marginTop:20}},
            h('div',{style:{fontSize:13,fontWeight:600,color:T.text,fontFamily:font,marginBottom:12}},
              'Expenses — '+stmt.expenses.length+' items  ',
              h('span',{style:{color:T.red,fontWeight:400}},'('+fmt$((stmt.expenses||[]).reduce((s,e)=>s+e.amount,0))+')')),
            h(Table,{cols:eCols,rows:stmt.expenses.map((e,i)=>({...e,id:'e'+i}))}))));
};

// ── Reconciliation ────────────────────────────────────────────────────────────
const ReconciliationPage = ({reservations,statements,readyForAnalysis,reconResults=[],setReconResults,year=2024}) => {
  const [ran,setRan]=useState(()=>reconResults.length>0);
  const [running,setRunning]=useState(false);
  const [msg,setMsg]=useState(null);
  const [runKey,setRunKey]=useState(0);
  const [activeFilter,setActiveFilter]=useState('all');
  const [csvModal,setCsvModal]=useState(null);
  const [prevYear,setPrevYear]=useState(year);

  // When year changes, clear stale results so user must re-run
  if(prevYear!==year){
    setPrevYear(year);
    setRan(reconResults.length>0);
    setActiveFilter('all');
  }

  const runReconciliation=()=>{
    if(!reservations.length){setMsg({type:'error',text:'Upload reservations first'});return;}
    if(!Object.values(statements).some(Boolean)){setMsg({type:'error',text:'Upload at least one owner statement first'});return;}
    setRunning(true);
    setTimeout(()=>{
      const r=computeResults();
      setReconResults(r);
      setRan(true);setRunning(false);setMsg({type:'success',text:'Reconciliation complete — '+r.length+' '+year+' reservations processed'});
    },400);
  };

  // results stored in yearData via reconResults prop — persists across navigation

  const computeResults = () => {
    // Only reconcile reservations that belong to the active year
    const resInYear = reservations.filter(r=>{
      if(!r.checkInDate) return true; // keep if no date
      const d = r.checkInDate instanceof Date ? r.checkInDate : new Date(r.checkInDate);
      const y = isNaN(d.getTime()) ? String(r.checkInDate||'').slice(0,4) : String(d.getFullYear());
      return !y || y===String(year);
    });
    const stmtBookings=Object.values(statements).filter(Boolean).flatMap(s=>(s.bookings||[]).map(b=>({...b,_month:s.month})));

    const nameMatch=(resFirst,resLast,stmtGuest)=>{
      const sg=normStr(stmtGuest);
      const rl=normStr(resLast).trim();
      const rf=normStr(resFirst).trim();
      if(!sg||(!rl&&!rf)) return false;
      // 0. Initials / very short names (e.g. "K C") — exact full match
      const fullRes=(rf+' '+rl).trim();
      if(fullRes.length<=5&&sg===fullRes) return true;
      if(fullRes.length<=5&&sg.startsWith(fullRes)) return true;
      // 1. Exact full name match: statement contains both first and last
      if(rl.length>=2&&sg.includes(rl)&&rf.length>=2&&sg.includes(rf)) return true;
      // 2. Last name only — require at least 4 chars to avoid false positives
      if(rl.length>=4&&sg.includes(rl)) return true;
      // 3. Statement guest's last word matches reservation last name (min 4 chars)
      const sgLast=(sg.split(' ').pop()||'').trim();
      if(sgLast.length>=4&&rl.includes(sgLast)) return true;
      // 4. First name fallback (min 4 chars)
      if(rf.length>=4&&sg.includes(rf)) return true;
      return false;
    };

    // Extract year from any date value — handles Date objects, ISO strings, timestamps
    const dateYear = d => {
      if(!d) return '';
      if(d instanceof Date) return String(d.getFullYear());
      const s = String(d);
      // ISO string: '2024-06-02' or '2024-06-02T...'
      const iso = /^(\d{4})-\d{2}-\d{2}/.exec(s);
      if(iso) return iso[1];
      // Date.toString(): 'Fri Jan 12 2024 ...'
      const dt = new Date(d);
      if(!isNaN(dt.getTime())) return String(dt.getFullYear());
      return '';
    };

    return resInYear.map(res=>{
      if(normStr(res.status)==='ownerstay') return {...res,matchStatus:'OWNER STAY',stmt:null,notes:'Owner stay – no revenue'};

      // Normalise reservation checkInDate to YYYY-MM-DD for comparison
      const toISO = d => {
        if(!d) return '';
        if(typeof d==='string'&&/^\d{4}-\d{2}-\d{2}/.test(d)) return d.slice(0,10);
        const dt = d instanceof Date ? d : new Date(d);
        if(isNaN(dt.getTime())) return String(d);
        const y=dt.getFullYear(), m=String(dt.getMonth()+1).padStart(2,'0'), day=String(dt.getDate()).padStart(2,'0');
        return y+'-'+m+'-'+day;
      };
      const resDate = toISO(res.checkInDate);
      const resYear = dateYear(res.checkInDate);

      // Match only within the same year AND same month
      // A reservation for Jun 2025 can only match a Jun 2025 statement booking
      const resMonth = resDate.slice(0,7); // 'YYYY-MM'

      // Same year + same month bookings only
      const sameMonthBookings = stmtBookings.filter(b=>{
        const bc = String(b.checkInDate||'');
        return bc.slice(0,4)===resYear && bc.slice(0,7)===resMonth;
      });

      // 1. Best: name + exact date within same month
      let match = sameMonthBookings.find(b=>
        nameMatch(res.firstName,res.lastName,b.guest) &&
        normStr(b.checkInDate||'') === resDate
      );

      // 2. Name only within same month
      if(!match) match = sameMonthBookings.find(b=>nameMatch(res.firstName,res.lastName,b.guest));

      // No match — no statement exists for this month
      if(!match) return {...res,matchStatus:'MISSING FROM STATEMENTS',stmt:null,listing:res.listing||'',
        notes:'No '+resMonth+' statement found for this guest'};

      const moPad=String(match._month||'').padStart(2,'0');
      const MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const moLabel=match._month?(MNAMES[(match._month||1)-1]+' '+year):'—';
      return {...res,matchStatus:'MATCHED',stmt:match,stmtOwnerPayout:match.ownerPayout,stmtBaseRate:match.baseRate,listing:match.listing||res.listing||'',stmtGuestName:match.guest||'',stmtMonth:moLabel,notes:''};
    });
  };;

  const cnt=s=>reconResults.filter(r=>r.matchStatus===s).length;
  const scfg={'MATCHED':[T.green,T.greenLight],'MISSING FROM STATEMENTS':[T.red,T.redLight],'PARTIAL MATCH':[T.amber,T.amberLight],'OWNER STAY':[T.blue,T.blueLight]};

  const cols=[
    {key:'_n',label:'Guest',render:(_,r)=>h('span',{className:'cell-guest',title:(r.firstName+' '+r.lastName).trim()},(r.firstName+' '+r.lastName).trim())},
    {key:'checkInDate',label:'Check-in',render:fmtDate},{key:'checkOutDate',label:'Check-out',render:fmtDate},
    {key:'numberOfNights',label:'Nights',align:'center'},
    {key:'listing',label:'Listing',render:v=>{ const lc=(v||'').toLowerCase(); const isGM=lc.includes('green meadows'); const isCC=lc.includes('cherry cottage'); const bg=isGM?'#D4EDDA':isCC?'#FFE5CC':T.blueLight; const color=isGM?'#155724':isCC?'#7A3200':T.navy; return v?h(Badge,{label:v,color,bg}):h('span',{style:{color:T.gray3,fontSize:11}},'—'); }},
    {key:'channel',label:'Channel',render:v=>h(Badge,{label:v,color:T.navy,bg:T.blueLight})},
    {key:'totalPrice',label:'Res. Total',align:'right',render:fmt$},
    {key:'stmtOwnerPayout',label:'Stmt Payout',align:'right',render:fmt$},
    {key:'stmtGuestName',label:'Stmt Guest Name',render:v=>v?h('span',{className:'cell-guest',title:v,style:{fontSize:11,color:T.textSub}},v):h('span',{style:{color:T.gray3,fontSize:11}},'—')},
    {key:'stmtMonth',label:'Statement',render:v=>v?h(Badge,{label:v,color:T.navy,bg:T.blueLight}):h('span',{style:{color:T.gray3,fontSize:11}},'—')},
    {key:'matchStatus',label:'Status',render:v=>{const [c,bg]=scfg[v]||[T.textSub,T.gray1];return h(Badge,{label:v,color:c,bg});}},
    {key:'notes',label:'Notes',render:v=>v?h('span',{style:{color:T.textSub,fontSize:11}},v):null},
  ];

  const canRun=reservations.length>0&&Object.values(statements).some(Boolean);

  const downloadRecon = () => {
    const filtered = reconResults.filter(r=>
      activeFilter==='matched'?r.matchStatus==='MATCHED':
      activeFilter==='missing'?r.matchStatus==='MISSING FROM STATEMENTS':
      activeFilter==='other'?(r.matchStatus==='PARTIAL MATCH'||r.matchStatus==='OWNER STAY'):
      true);
    if(!filtered.length){setMsg({type:'error',text:'No results to download — run reconciliation first'});return;}

    // ── Style helpers ──────────────────────────────────────────────────────
    const S={
      hdr:  {font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'center',vertical:'center'}},
      hdrR: {font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'right',vertical:'center'}},
      matched:  {font:{color:{rgb:'1A5C38'},sz:10},fill:{fgColor:{rgb:'E6F7EE'}},alignment:{horizontal:'center'}},
      missing:  {font:{color:{rgb:'8B0000'},sz:10},fill:{fgColor:{rgb:'FFC7CE'}},alignment:{horizontal:'center'}},
      partial:  {font:{color:{rgb:'BF8F00'},sz:10},fill:{fgColor:{rgb:'FFF3CD'}},alignment:{horizontal:'center'}},
      ownerstay:{font:{color:{rgb:'1F4E79'},sz:10},fill:{fgColor:{rgb:'DEEAF1'}},alignment:{horizontal:'center'}},
      txt:  {font:{sz:10}},
      num:  {font:{sz:10},alignment:{horizontal:'right'},numFmt:'$#,##0.00'},
      ctr:  {font:{sz:10},alignment:{horizontal:'center'}},
      date: {font:{sz:10},alignment:{horizontal:'center'}},
      altTxt: {font:{sz:10},fill:{fgColor:{rgb:'F5F7FA'}}},
      altNum: {font:{sz:10},fill:{fgColor:{rgb:'F5F7FA'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00'},
      altCtr: {font:{sz:10},fill:{fgColor:{rgb:'F5F7FA'}},alignment:{horizontal:'center'}},
      sumRow: {font:{bold:true,sz:10},fill:{fgColor:{rgb:'E8EDF7'}}},
      sumNum: {font:{bold:true,sz:10},fill:{fgColor:{rgb:'E8EDF7'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00'},
    };
    const cell=(v,s)=>({v,t:typeof v==='number'?'n':'s',s});
    const mkSheet=(rows,cols)=>{
      const ws={'!cols':cols};
      rows.forEach((row,ri)=>row.forEach((c,ci)=>{
        if(!c) return;
        ws[XLSX.utils.encode_cell({r:ri,c:ci})]=c;
      }));
      ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:rows.length-1,c:Math.max(...rows.map(r=>r.length))-1}});
      return ws;
    };

    const wb=XLSX.utils.book_new();

    // ── Sheet 1: Reconciliation Results ───────────────────────────────────
    const statusStyle = s=>{
      if(s==='MATCHED') return S.matched;
      if(s==='MISSING FROM STATEMENTS') return S.missing;
      if(s==='OWNER STAY') return S.ownerstay;
      return S.partial;
    };

    // Group by listing for summary
    const byListing={};
    filtered.forEach(r=>{
      const l=r.listing||'Unknown';
      if(!byListing[l]) byListing[l]={matched:0,missing:0,other:0,resTotal:0,stmtPayout:0};
      if(r.matchStatus==='MATCHED') byListing[l].matched++;
      else if(r.matchStatus==='MISSING FROM STATEMENTS') byListing[l].missing++;
      else byListing[l].other++;
      byListing[l].resTotal+=(r.totalPrice||0);
      byListing[l].stmtPayout+=(r.stmtOwnerPayout||0);
    });

    const titleRow=[cell('RECONCILIATION REPORT — FY '+year,{font:{bold:true,color:{rgb:'1B2A4A'},sz:14}})];
    const subRow=[cell('Generated: '+new Date().toLocaleDateString()+
      '  |  Filter: '+(activeFilter==='all'?'All':activeFilter==='matched'?'Matched Only':activeFilter==='missing'?'Missing Only':'Other')+
      '  |  Total records: '+filtered.length,{font:{color:{rgb:'6B7280'},sz:9,italic:true}})];
    const blankRow=[];

    const hdrRow=[
      cell('Guest',S.hdr),cell('Check-in',S.hdr),cell('Check-out',S.hdr),
      cell('Nights',S.hdr),cell('Listing',S.hdr),cell('Channel',S.hdr),
      cell('Res. Total',S.hdrR),cell('Stmt Payout',S.hdrR),
      cell('Difference',S.hdrR),cell('Match Status',S.hdr),cell('Notes',S.hdr),
    ];

    const dataRows=filtered.map((r,i)=>{
      const alt=i%2===1;
      const st=statusStyle(r.matchStatus);
      const diff=(r.totalPrice||0)-(r.stmtOwnerPayout||0);
      return [
        cell((r.firstName+' '+r.lastName).trim(), alt?S.altTxt:S.txt),
        cell(fmtDate(r.checkInDate), alt?S.altCtr:S.date),
        cell(fmtDate(r.checkOutDate), alt?S.altCtr:S.date),
        cell(r.numberOfNights||null, alt?S.altCtr:S.ctr),
        cell(r.listing||'—', alt?S.altTxt:S.txt),
        cell(r.channel||'—', alt?S.altCtr:S.ctr),
        cell(r.totalPrice||null, alt?S.altNum:S.num),
        cell(r.stmtOwnerPayout||null, alt?S.altNum:S.num),
        cell(r.stmtGuestName||'—', alt?S.altTxt:S.txt),
        cell(r.stmtMonth||'—', alt?S.altCtr:S.ctr),
        cell(r.matchStatus==='MATCHED'?(diff||null):null, alt?S.altNum:S.num),
        cell(r.matchStatus||'', st),
        cell(r.notes||'', alt?S.altTxt:S.txt),
      ];
    });

    // Summary section
    const gap=[];
    const sumHdr=[cell('SUMMARY BY LISTING',{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}}})];
    const sumColHdr=[
      cell('Listing',{font:{bold:true,color:{rgb:'FFFFFF'},sz:9},fill:{fgColor:{rgb:'2A3F6F'}},alignment:{horizontal:'left'}}),
      cell('Matched',{font:{bold:true,color:{rgb:'FFFFFF'},sz:9},fill:{fgColor:{rgb:'2A3F6F'}},alignment:{horizontal:'center'}}),
      cell('Missing',{font:{bold:true,color:{rgb:'FFFFFF'},sz:9},fill:{fgColor:{rgb:'2A3F6F'}},alignment:{horizontal:'center'}}),
      cell('Other',{font:{bold:true,color:{rgb:'FFFFFF'},sz:9},fill:{fgColor:{rgb:'2A3F6F'}},alignment:{horizontal:'center'}}),
      cell('Total Res $',{font:{bold:true,color:{rgb:'FFFFFF'},sz:9},fill:{fgColor:{rgb:'2A3F6F'}},alignment:{horizontal:'right'}}),
      cell('Total Stmt Payout',{font:{bold:true,color:{rgb:'FFFFFF'},sz:9},fill:{fgColor:{rgb:'2A3F6F'}},alignment:{horizontal:'right'}}),
    ];
    const sumDataRows=Object.entries(byListing).map(([l,v],i)=>{
      const alt=i%2===1;
      return [
        cell(l,alt?S.altTxt:S.txt),
        cell(v.matched,{font:{color:{rgb:'1A5C38'},sz:10},alignment:{horizontal:'center'}}),
        cell(v.missing||null,{font:{color:{rgb:v.missing?'8B0000':'AAAAAA'},sz:10},alignment:{horizontal:'center'}}),
        cell(v.other||null,alt?S.altCtr:S.ctr),
        cell(v.resTotal||null,alt?S.altNum:S.num),
        cell(v.stmtPayout||null,alt?S.altNum:S.num),
      ];
    });
    const grandTotals=[
      cell('TOTAL',{font:{bold:true,sz:10},fill:{fgColor:{rgb:'1B2A4A'}},color:{rgb:'FFFFFF'}}),
      cell(filtered.filter(r=>r.matchStatus==='MATCHED').length,{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'center'}}),
      cell(filtered.filter(r=>r.matchStatus==='MISSING FROM STATEMENTS').length,{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'center'}}),
      cell(filtered.filter(r=>r.matchStatus!=='MATCHED'&&r.matchStatus!=='MISSING FROM STATEMENTS').length,{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'center'}}),
      cell(filtered.reduce((s,r)=>s+(r.totalPrice||0),0)||null,{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00'}),
      cell(filtered.reduce((s,r)=>s+(r.stmtOwnerPayout||0),0)||null,{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B2A4A'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00'}),
    ];

    const allRows=[titleRow,subRow,blankRow,hdrRow,...dataRows,blankRow,blankRow,sumHdr,sumColHdr,...sumDataRows,grandTotals];
    const cols=[{wch:28},{wch:12},{wch:12},{wch:7},{wch:18},{wch:16},{wch:13},{wch:14},{wch:24},{wch:14},{wch:12},{wch:24},{wch:32}];
    XLSX.utils.book_append_sheet(wb,mkSheet(allRows,cols),'Income Reconciliation');

    // ── Sheet 2: Missing from Statements ──────────────────────────────────
    const missing=filtered.filter(r=>r.matchStatus==='MISSING FROM STATEMENTS');
    if(missing.length){
      const mRows=[
        [cell('MISSING FROM STATEMENTS — FY '+year,{font:{bold:true,color:{rgb:'8B0000'},sz:13}})],
        [cell('These reservations have no matching entry in any uploaded owner statement',{font:{color:{rgb:'6B7280'},sz:9,italic:true}})],
        [],
        [cell('Guest',S.hdr),cell('Check-in',S.hdr),cell('Check-out',S.hdr),
         cell('Nights',S.hdr),cell('Listing',S.hdr),cell('Channel',S.hdr),
         cell('Res. Total',S.hdrR),cell('Notes',S.hdr)],
        ...missing.map((r,i)=>{
          const alt=i%2===1;
          return [
            cell((r.firstName+' '+r.lastName).trim(),alt?S.altTxt:S.txt),
            cell(fmtDate(r.checkInDate),alt?S.altCtr:S.date),
            cell(fmtDate(r.checkOutDate),alt?S.altCtr:S.date),
            cell(r.numberOfNights||null,alt?S.altCtr:S.ctr),
            cell(r.listing||'—',alt?S.altTxt:S.txt),
            cell(r.channel||'—',alt?S.altCtr:S.ctr),
            cell(r.totalPrice||null,alt?S.altNum:S.num),
            cell(r.notes||'',alt?S.altTxt:S.txt),
          ];
        }),
        [],
        [cell('TOTAL: '+missing.length+' missing',{font:{bold:true,sz:10},fill:{fgColor:{rgb:'FFC7CE'}}}),
         null,null,null,null,null,
         cell(missing.reduce((s,r)=>s+(r.totalPrice||0),0)||null,{font:{bold:true,sz:10},fill:{fgColor:{rgb:'FFC7CE'}},alignment:{horizontal:'right'},numFmt:'$#,##0.00'})],
      ];
      XLSX.utils.book_append_sheet(wb,mkSheet(mRows,[{wch:28},{wch:12},{wch:12},{wch:7},{wch:18},{wch:16},{wch:13},{wch:32}]),'Missing from Statements');
    }

    // ── Sheet 3: Matched ──────────────────────────────────────────────────
    const matched=filtered.filter(r=>r.matchStatus==='MATCHED');
    if(matched.length){
      const mRows=[
        [cell('MATCHED RESERVATIONS — FY '+year,{font:{bold:true,color:{rgb:'1A5C38'},sz:13}})],
        [cell('Reservations successfully matched to owner statement bookings',{font:{color:{rgb:'6B7280'},sz:9,italic:true}})],
        [],
        [cell('Guest',S.hdr),cell('Check-in',S.hdr),cell('Check-out',S.hdr),
         cell('Nights',S.hdr),cell('Listing',S.hdr),cell('Channel',S.hdr),
         cell('Res. Total',S.hdrR),cell('Stmt Payout',S.hdrR),cell('Stmt Guest Name',S.hdr),cell('Statement',S.hdr),cell('Difference',S.hdrR)],
        ...matched.map((r,i)=>{
          const alt=i%2===1;
          const diff=(r.totalPrice||0)-(r.stmtOwnerPayout||0);
          const diffStyle=Math.abs(diff)<1?{font:{color:{rgb:'1A5C38'},sz:10},alignment:{horizontal:'right'},numFmt:'$#,##0.00'}
            :{font:{color:{rgb:'BF8F00'},sz:10},alignment:{horizontal:'right'},numFmt:'$#,##0.00'};
          return [
            cell((r.firstName+' '+r.lastName).trim(),alt?S.altTxt:S.txt),
            cell(fmtDate(r.checkInDate),alt?S.altCtr:S.date),
            cell(fmtDate(r.checkOutDate),alt?S.altCtr:S.date),
            cell(r.numberOfNights||null,alt?S.altCtr:S.ctr),
            cell(r.listing||'—',alt?S.altTxt:S.txt),
            cell(r.channel||'—',alt?S.altCtr:S.ctr),
            cell(r.totalPrice||null,alt?S.altNum:S.num),
            cell(r.stmtOwnerPayout||null,alt?S.altNum:S.num),
            cell(r.stmtGuestName||'—',alt?S.altTxt:S.txt),
            cell(r.stmtMonth||'—',alt?S.altCtr:S.ctr),
            cell(diff||null,diffStyle),
          ];
        }),
        [],
        [cell('TOTAL: '+matched.length+' matched',S.sumRow),null,null,null,null,null,
         cell(matched.reduce((s,r)=>s+(r.totalPrice||0),0)||null,S.sumNum),
         cell(matched.reduce((s,r)=>s+(r.stmtOwnerPayout||0),0)||null,S.sumNum),
         cell(matched.reduce((s,r)=>s+(r.totalPrice||0)-(r.stmtOwnerPayout||0),0)||null,S.sumNum)],
      ];
      XLSX.utils.book_append_sheet(wb,mkSheet(mRows,[{wch:28},{wch:12},{wch:12},{wch:7},{wch:18},{wch:16},{wch:13},{wch:13},{wch:24},{wch:14},{wch:12}]),'Matched');
    }

    XLSX.writeFile(wb,'reconciliation_FY'+year+'.xlsx',{cellStyles:true,bookType:'xlsx'});
    setMsg({type:'success',text:'Downloaded reconciliation_FY'+year+'.xlsx — '+filtered.length+' records, '+wb.SheetNames.length+' sheets'});
  };;

  return h('div',null,
    h(SectionHeader,{title:'Income Reconciliation',sub:'Match reservations against owner statement bookings',
      actions:h('div',{style:{display:'flex',gap:8}},
        reconResults.length>0&&h('button',{onClick:downloadRecon,style:{padding:'9px 18px',borderRadius:7,
          fontFamily:font,fontSize:13,fontWeight:600,cursor:'pointer',
          display:'inline-flex',alignItems:'center',gap:6,
          border:'none',background:T.teal,color:T.white}},
          h(Icon,{d:IC.download,size:14,color:T.white}),
          activeFilter==='all'?'Export to Excel ('+reconResults.length+')':'Export Filtered ('+reconResults.filter(r=>activeFilter==='matched'?r.matchStatus==='MATCHED':activeFilter==='missing'?r.matchStatus==='MISSING FROM STATEMENTS':r.matchStatus==='PARTIAL MATCH'||r.matchStatus==='OWNER STAY').length+')'),
        h('button',{onClick:runReconciliation,disabled:running,style:{padding:'9px 18px',borderRadius:7,
          fontFamily:font,fontSize:13,fontWeight:600,cursor:running?'wait':'pointer',
          display:'inline-flex',alignItems:'center',gap:6,
          border:'1px solid '+(canRun?T.navy:T.border),background:canRun?T.navy:T.gray1,
          color:canRun?T.white:T.gray4,opacity:running?0.7:1,transition:'all 0.15s'}},
          h(Icon,{d:IC.refresh,size:14,color:'currentColor',style:{animation:running?'spin 1s linear infinite':'none'}}),
          running?'Running…':'Run Reconciliation'))}),
    h(AlertBanner,{msg,onClose:()=>setMsg(null)}),
    !readyForAnalysis&&reservations.length>0&&h('div',{style:{padding:'10px 14px',borderRadius:8,marginBottom:16,
      fontSize:12,background:T.amberLight,color:T.amber,fontFamily:font,display:'flex',alignItems:'center',gap:8}},
      h(Icon,{d:IC.alert,size:14,color:T.amber}),'Tip: Mark reservations as "Ready for Analysis" before reconciling'),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}},
      // Clickable filter cards — click to filter table; click again to reset
      [
        {key:'all',    label:'Total Reservations', value:reservations.length,           icon:IC.list,  accent:T.navy},
        {key:'matched',label:'Matched',             value:ran?cnt('MATCHED'):'-',        icon:IC.check, accent:T.green},
        {key:'missing',label:'Missing',             value:ran?cnt('MISSING FROM STATEMENTS'):'-', icon:IC.alert, accent:T.red},
        {key:'other',  label:'Other',               value:ran?cnt('PARTIAL MATCH')+cnt('OWNER STAY'):'-', icon:IC.link, accent:T.amber},
      ].map(({key,label,value,icon,accent})=>
        h('div',{key,onClick:ran?()=>setActiveFilter(activeFilter===key?'all':key):undefined,
          style:{cursor:ran?'pointer':'default',
            outline:activeFilter===key&&ran?'3px solid '+accent:'none',
            outlineOffset:2,borderRadius:10,transition:'outline 0.15s'}},
          h(StatCard,{label,value,icon,accent,
            sub:ran&&activeFilter===key?'click to clear filter':ran?'click to filter':null})))),
    ran&&activeFilter!=='all'&&h('div',{style:{display:'flex',alignItems:'center',gap:8,
      marginBottom:12,padding:'8px 14px',borderRadius:8,background:T.blueLight,
      border:'1px solid '+T.blue+'40',fontSize:12,fontFamily:font,color:T.navy}},
      h(Icon,{d:IC.alert,size:13,color:T.blue}),
      'Showing: ',
      h('strong',null,
        activeFilter==='matched'?'Matched reservations':
        activeFilter==='missing'?'Missing from statements':
        'Other (partial match / owner stay)'),
      h('span',{onClick:()=>setActiveFilter('all'),style:{marginLeft:'auto',cursor:'pointer',
        fontSize:11,color:T.blue,fontWeight:600,textDecoration:'underline'}},'Show all')),
    csvModal&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:1000,
      display:'flex',alignItems:'center',justifyContent:'center',padding:24}},
      h('div',{style:{background:T.white,borderRadius:12,width:'100%',maxWidth:820,
        maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(0,0,0,0.25)'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'14px 20px',borderBottom:'1px solid '+T.border,flexShrink:0}},
          h('div',null,
            h('div',{style:{fontSize:13,fontWeight:700,color:T.text,fontFamily:font}},csvModal.title),
            h('div',{style:{fontSize:11,color:T.textSub,fontFamily:font,marginTop:2}},'Select all → Copy → Paste into Excel or save as .csv')),
          h('button',{onClick:()=>setCsvModal(null),style:{border:'none',background:'none',
            cursor:'pointer',fontSize:20,color:T.gray3,padding:'0 4px',lineHeight:1}},'×')),
        h('div',{style:{padding:'12px 20px',flexShrink:0,borderBottom:'1px solid '+T.border,
          display:'flex',gap:8}},
          h('button',{onClick:()=>{const ta=document.getElementById('csv-modal-ta');if(ta){ta.select();document.execCommand('copy');setMsg({type:'success',text:'Copied to clipboard!'});}},
            style:{padding:'7px 16px',borderRadius:6,fontSize:12,fontFamily:font,fontWeight:600,
              cursor:'pointer',background:T.navy,color:T.white,border:'none'}},
            'Copy to Clipboard'),
          h('button',{onClick:()=>setCsvModal(null),style:{padding:'7px 16px',borderRadius:6,
            fontSize:12,fontFamily:font,cursor:'pointer',border:'1px solid '+T.border,
            background:T.white,color:T.textSub}},'Close')),
        h('textarea',{id:'csv-modal-ta',readOnly:true,value:csvModal.content,
          style:{flex:1,margin:0,padding:'12px 20px',border:'none',outline:'none',
            fontFamily:'monospace',fontSize:11,resize:'none',background:T.gray0,
            overflowY:'auto',whiteSpace:'pre'}}))),
    !reservations.length
      ?h('div',{style:{textAlign:'center',padding:'48px 24px',color:T.textSub,fontFamily:font,fontSize:13,
          background:T.gray0,borderRadius:10,border:'1px solid '+T.border}},'Upload reservations and owner statements to run reconciliation')
      :!ran&&!reconResults.length
        ?h('div',{style:{textAlign:'center',padding:'48px 24px',color:T.textSub,fontFamily:font,fontSize:13,
            background:T.gray0,borderRadius:10,border:'1px solid '+T.border}},
            h('div',{style:{marginBottom:12}},h(Icon,{d:IC.refresh,size:32,color:T.gray3})),
            'Click "Run Reconciliation" to match your reservations against owner statements')
        :(()=>{
          const filteredRows=reconResults
            .filter(r=>
              activeFilter==='matched'?r.matchStatus==='MATCHED':
              activeFilter==='missing'?r.matchStatus==='MISSING FROM STATEMENTS':
              activeFilter==='other'?(r.matchStatus==='PARTIAL MATCH'||r.matchStatus==='OWNER STAY'):
              true)
            .map((r,i)=>({...r,id:r.id||'rec'+i}));
          const totalNights=filteredRows.reduce((s,r)=>s+(r.numberOfNights||0),0);
          const totalRes=filteredRows.reduce((s,r)=>s+(r.totalPrice||0),0);
          const totalPayout=filteredRows.reduce((s,r)=>s+(r.stmtOwnerPayout||0),0);
          return h('div',null,
            h(Table,{cols,rows:filteredRows}),
            filteredRows.length>0&&h('div',{style:{
              display:'flex',gap:24,padding:'12px 20px',
              background:T.gray0,borderTop:'2px solid '+T.border,
              borderRadius:'0 0 8px 8px',flexWrap:'wrap'}},
              h('div',{style:{fontSize:12,fontWeight:600,color:T.textSub,fontFamily:font}},
                filteredRows.length+' record'+(filteredRows.length!==1?'s':'')),
              h('div',{style:{width:1,background:T.border}}),

                h('span',{style:{fontWeight:700}},(totalNights).toLocaleString())),
              h('div',{style:{width:1,background:T.border}}),
              h('div',{style:{fontSize:12,fontFamily:font,color:T.text}},

              activeFilter==='matched'&&totalPayout>0&&h('div',{style:{width:1,background:T.border}}),
              activeFilter==='matched'&&totalPayout>0&&h('div',{style:{fontSize:12,fontFamily:font,color:T.text}},
                h('span',{style:{color:T.textSub}},'Stmt Payout: '),
                h('span',{style:{fontWeight:700,color:T.green}},fmt$(totalPayout)))));
        })());
};

// ── P&L Page ──────────────────────────────────────────────────────────────────
const PLPage = ({statements,year=2024,ownerExpenses=[]}) => {
  const [activeListing, setActiveListing] = useState('all');

  const stmtList=Object.entries(statements).filter(([,s])=>s);
  if(!stmtList.length) return h('div',null,
    h(SectionHeader,{title:'P&L Statement',sub:'Annual profit and loss report'}),
    h('div',{style:{textAlign:'center',padding:'48px 24px',color:T.textSub,fontFamily:font,
      fontSize:13,background:T.gray0,borderRadius:10,border:'1px solid '+T.border}},
      'Upload '+year+' owner statements to generate the P&L report'));

  // ── Derive available listings from statement bookings ─────────────────────
  const allBookings = stmtList.flatMap(([,s])=>s.bookings||[]);
  const listings = [...new Set(allBookings.map(b=>b.listing||'').filter(l=>{
    // Filter out numeric-looking values that got picked up by the fallback scanner
    if(!l) return false;
    if(!isNaN(parseFloat(l)) && isFinite(l)) return false;  // pure number
    if(/^[\d,\.\s]+$/.test(l)) return false;  // only digits/commas/dots
    return l.length>1;
  }))].sort();

  // ── Filter bookings and build monthly maps by listing ─────────────────────
  const filterBooking = b => activeListing==='all' || (b.listing||'')=== activeListing;

  const sum=obj=>Object.values(obj).reduce((s,v)=>s+(v||0),0);
  const mArr = Array.from({length:12},(_,i)=>i+1);
  const mMap = fn => Object.fromEntries(mArr.map(m=>[m,fn(m)]));

  // Revenue: from statement bookings filtered by listing
  const revM = mMap(m=>{
    const s=statements[m]; if(!s) return null;
    if(activeListing==='all') return s.rentalRevenue||null;
    const filtered=(s.bookings||[]).filter(filterBooking);
    const t=filtered.reduce((a,b)=>a+(b.rentalRevenue||0),0);
    return t||null;
  });

  // PM Commission: proportional to revenue share when filtered
  const pmM = mMap(m=>{
    const s=statements[m]; if(!s) return null;
    if(activeListing==='all') return s.pmCommission?-s.pmCommission:null;
    const filtered=(s.bookings||[]).filter(filterBooking);
    const t=filtered.reduce((a,b)=>a+(b.pmCommission||0),0);
    return t?-t:null;
  });

  // Owner Payout — listing-filtered (used for revenue/P&L rows)
  const payM = mMap(m=>{
    const s=statements[m]; if(!s) return null;
    if(activeListing==='all') return s.ownerPayout||null;
    const filtered=(s.bookings||[]).filter(filterBooking);
    const t=filtered.reduce((a,b)=>a+(b.ownerPayout||0),0);
    return t||null;
  });

  // Operating expenses — filter by listing when one is selected
  const byMonth={};
  for(let m=1;m<=12;m++){const s=statements[m];byMonth[m]=s?{expenses:s.expenses||[]}:null;}
  const expCats=['PM Monthly Service Fee','Maintenance & Construction','Pest Control','Landscaping',
    'Supplies – Household & Property','Supplies – Propane','Linen Service & Cleaning','Owner Stay – Cleaning Fee'];
  const expByMC=cat=>mMap(m=>{
    const exps=(byMonth[m]?.expenses||[]).filter(e=>{
      if(activeListing==='all') return true;
      return !e.listing||e.listing===activeListing;
    });
    const t=exps.filter(e=>catExpense(e.description)===cat).reduce((s,e)=>s+e.amount,0);
    return t||null;
  });
  const expMaps=expCats.map(cat=>({cat,vals:expByMC(cat)})).filter(({vals})=>Object.values(vals).some(v=>v!=null));
  const totalExpM=mMap(m=>expMaps.reduce((s,{vals})=>s+(vals[m]||0),0)||null);

  // Owner Payout — ALL listings total (used in reconciliation section only)
  const allPayM = mMap(m=>{
    const s=statements[m]; if(!s) return null;
    return s.ownerPayout||null;
  });

  // Net Rental Revenue
  const netRM=mMap(m=>{ const r=revM[m],p=pmM[m]; return (r||p)?(r||0)+(p||0):null; });

  // Net Operating Income (before owner expenses)
  const noiM=mMap(m=>{ const n=netRM[m],e=totalExpM[m]; return (n||e)?(n||0)+(e||0):null; });

  // ── Owner expenses from credit card (filtered by listing if selected) ──────
  const ownerExpInPL = (ownerExpenses||[]).filter(e=>e.addedToPL &&
    (activeListing==='all' || !e.listing || e.listing===activeListing));
  const ownerExpByMonthCat = {};
  for(const e of ownerExpInPL){
    const d=new Date(e.date); if(isNaN(d)) continue;
    const m=d.getMonth()+1;
    if(!ownerExpByMonthCat[e.category]) ownerExpByMonthCat[e.category]={};
    ownerExpByMonthCat[e.category][m]=(ownerExpByMonthCat[e.category][m]||0)+e.amount;
  }
  const ownerExpPlMaps=Object.entries(ownerExpByMonthCat).map(([cat,mv])=>({
    cat, vals:mMap(m=>mv[m]?-mv[m]:null)
  })).filter(({vals})=>Object.values(vals).some(v=>v!=null));
  const totalOwnerExpM=mMap(m=>ownerExpPlMaps.reduce((s,{vals})=>s+(vals[m]||0),0)||null);

  // ── Profit / Loss = All-listing Owner Payout + Owner Direct Expenses ────────
  const plM=mMap(m=>{
    const p=allPayM[m]||0, oe=totalOwnerExpM[m]||0;
    return (allPayM[m]||ownerExpPlMaps.length)? p+oe : null;
  });

  const fmtV=v=>v==null?'—':v<0?'('+fmt$(Math.abs(v))+')':fmt$(v);
  const vColor=v=>v==null?T.gray3:v<0?T.red:T.green;

  const PLRow=({label,vals,bold,color,indent=2})=>
    h('tr',{style:{background:bold?T.gray1:T.white}},
      h('td',{style:{padding:'7px 12px',fontSize:12,fontFamily:font,paddingLeft:indent*8+8,
        color:color||T.text,fontWeight:bold?700:400,borderRight:'1px solid '+T.border,whiteSpace:'nowrap'}},label),
      mArr.map(i=>{ const v=vals[i];
        return h('td',{key:i,style:{padding:'7px 8px',fontSize:11,fontFamily:mono,textAlign:'right',
          color:color||vColor(v),fontWeight:bold?700:400,borderRight:'1px solid '+T.border}},fmtV(v));
      }),
      h('td',{style:{padding:'7px 8px',fontSize:12,fontFamily:mono,fontWeight:700,textAlign:'right',
        color:color||vColor(sum(vals)),background:T.gray0,borderLeft:'2px solid '+T.border}},fmtV(sum(vals))));

  const SHRow=({label,bg=T.navy,fg=T.white})=>
    h('tr',null,h('td',{colSpan:14,style:{padding:'8px 12px',fontSize:11,fontWeight:700,fontFamily:font,background:bg,color:fg,letterSpacing:0.4}},label));

  const NetRow=({label,vals,accent})=>{
    const t=sum(vals);
    return h('tr',{style:{background:accent||T.navyMid}},
      h('td',{style:{padding:'10px 12px',fontSize:13,fontWeight:700,fontFamily:font,color:T.white,borderRight:'1px solid rgba(255,255,255,0.1)'}},label),
      mArr.map(i=>{ const v=vals[i];
        return h('td',{key:i,style:{padding:'10px 8px',fontSize:12,fontFamily:mono,fontWeight:700,textAlign:'right',
          color:v==null?'rgba(255,255,255,0.3)':v<0?'#ffaaaa':'#7effc0',borderRight:'1px solid rgba(255,255,255,0.1)'}},fmtV(v));
      }),
      h('td',{style:{padding:'10px 8px',fontSize:13,fontFamily:mono,fontWeight:700,textAlign:'right',
        color:t<0?'#ffaaaa':'#7effc0',borderLeft:'2px solid rgba(255,255,255,0.2)',background:accent||T.navyMid}},fmtV(t)));
  };

  // Final P/L row — green background if profit, red if loss
  const ProfitRow=({label,vals})=>{
    const t=sum(vals);
    const isProfit=t>=0;
    const bg=isProfit?'#1a5c35':'#7a1c1c';
    return h('tr',{style:{background:bg}},
      h('td',{style:{padding:'12px 12px',fontSize:14,fontWeight:800,fontFamily:font,color:'#ffffff',
        borderRight:'1px solid rgba(255,255,255,0.15)',whiteSpace:'nowrap'}},label),
      mArr.map(i=>{ const v=vals[i]; const pos=v==null||v>=0;
        return h('td',{key:i,style:{padding:'12px 8px',fontSize:13,fontFamily:mono,fontWeight:800,
          textAlign:'right',color:v==null?'rgba(255,255,255,0.3)':pos?'#a8f0c6':'#ffaaaa',
          borderRight:'1px solid rgba(255,255,255,0.15)'}},fmtV(v));
      }),
      h('td',{style:{padding:'12px 8px',fontSize:14,fontFamily:mono,fontWeight:800,textAlign:'right',
        color:isProfit?'#a8f0c6':'#ffaaaa',
        borderLeft:'2px solid rgba(255,255,255,0.3)',background:bg}},
        (isProfit?'▲ ':'▼ ')+fmtV(t)));
  };

  const missing=Object.entries(byMonth).filter(([,v])=>!v).map(([m])=>MONTH_FULL[m-1]);

  return h('div',null,
    h(SectionHeader,{title:'P&L Statement',
      sub:'Annual profit and loss — FY '+year+(activeListing!=='all'?' · '+activeListing:'')}),

    // ── Listing selector ─────────────────────────────────────────────────────
    listings.length>0&&h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:16,
      padding:'10px 16px',background:T.white,border:'1px solid '+T.border,borderRadius:8}},
      h(Icon,{d:IC.home,size:14,color:T.navy}),
      h('span',{style:{fontSize:12,fontWeight:600,color:T.text,fontFamily:font}},'View by Listing:'),
      h('button',{onClick:()=>setActiveListing('all'),style:{
        padding:'5px 14px',borderRadius:6,fontSize:12,fontFamily:font,fontWeight:500,cursor:'pointer',
        border:'1px solid '+(activeListing==='all'?T.navy:T.border),
        background:activeListing==='all'?T.navy:T.white,
        color:activeListing==='all'?T.white:T.textSub}},'All Listings'),
      listings.map(l=>h('button',{key:l,onClick:()=>setActiveListing(l),style:{
        padding:'5px 14px',borderRadius:6,fontSize:12,fontFamily:font,fontWeight:500,cursor:'pointer',
        border:'1px solid '+(activeListing===l?T.teal:T.border),
        background:activeListing===l?T.teal:T.white,
        color:activeListing===l?T.white:T.textSub}},l))),

    missing.length>0&&h('div',{style:{padding:'10px 14px',borderRadius:8,marginBottom:16,fontSize:12,
      background:T.amberLight,color:T.amber,fontFamily:font,display:'flex',alignItems:'center',gap:8}},
      h(Icon,{d:IC.alert,size:14,color:T.amber}),'Missing statements: '+missing.join(', ')+'. Totals may be understated.'),

    h('div',{style:{overflowX:'auto',borderRadius:10,border:'1px solid '+T.border}},
      h('table',{style:{width:'100%',borderCollapse:'collapse',minWidth:1100}},
        h('thead',null,
          h('tr',{style:{background:T.navy}},
            h('th',{style:{padding:'10px 12px',textAlign:'left',fontSize:11,fontWeight:600,color:T.white,
              fontFamily:font,borderRight:'1px solid '+T.navyMid,width:240,whiteSpace:'nowrap'}},'Line Item'),
            MONTHS.map((m,i)=>h('th',{key:m,style:{padding:'10px 6px',textAlign:'right',fontSize:10,
              fontWeight:600,color:byMonth[i+1]?T.white:T.gray4,fontFamily:font,
              borderRight:'1px solid '+T.navyMid,minWidth:72}},m+(byMonth[i+1]?'':' *'))),
            h('th',{style:{padding:'10px 8px',textAlign:'right',fontSize:11,fontWeight:700,
              color:'#f5d87a',fontFamily:font,borderLeft:'2px solid '+T.navyMid,
              minWidth:90,whiteSpace:'nowrap'}},'FY '+year))),
        h('tbody',null,
          // REVENUE
          h(SHRow,{label:'  REVENUE'}),
          h(PLRow,{label:'Gross Rental Revenue',vals:revM}),
          h(PLRow,{label:'TOTAL GROSS REVENUE',vals:revM,bold:true,color:T.navy}),
          h('tr',null,h('td',{colSpan:14,style:{height:6}})),
          // MANAGEMENT FEES
          h(SHRow,{label:'  MANAGEMENT & BOOKING FEES',bg:T.gray5}),
          h(PLRow,{label:'Property Management Commission',vals:pmM,color:T.red}),
          h(PLRow,{label:'TOTAL MANAGEMENT FEES',vals:pmM,bold:true,color:T.red}),
          h('tr',null,h('td',{colSpan:14,style:{height:4}})),
          h(NetRow,{label:'NET RENTAL REVENUE',vals:netRM}),
          h('tr',null,h('td',{colSpan:14,style:{height:8}})),
          // OPERATING EXPENSES (from statements)
          h(SHRow,{label:'  OPERATING EXPENSES (Property Management)',bg:T.gray5}),
          expMaps.map(({cat,vals})=>h(PLRow,{key:cat,label:cat,vals,color:T.red})),
          expMaps.length===0&&h(PLRow,{label:'No operating expenses recorded',vals:mMap(()=>null),color:T.gray3}),
          h(PLRow,{label:'TOTAL OPERATING EXPENSES',vals:totalExpM,bold:true,color:T.red}),
          h('tr',null,h('td',{colSpan:14,style:{height:4}})),
          h(NetRow,{label:'NET OPERATING INCOME',vals:noiM}),
          h('tr',null,h('td',{colSpan:14,style:{height:12}})),
          // OWNER PAYOUT RECONCILIATION
          activeListing==='all'&&h(SHRow,{label:'  OWNER PAYOUT RECONCILIATION',bg:'#374785'}),
          activeListing==='all'&&h(PLRow,{label:'Owner Payout (statement verified)',vals:allPayM,bold:true,color:T.navy}),
          h('tr',null,h('td',{colSpan:14,style:{height:12}})),
          // OWNER DIRECT EXPENSES
          h(SHRow,{label:'  OWNER DIRECT EXPENSES (Credit Card / Out-of-Pocket)',bg:'#4a3060',fg:T.white}),
          ownerExpPlMaps.length>0
            ? ownerExpPlMaps.map(({cat,vals})=>h(PLRow,{key:'oe-'+cat,label:cat,vals,color:'#9c27b0'}))
            : h(PLRow,{label:'No owner expenses added — go to Owner Expenses page to add',vals:mMap(()=>null),color:T.gray3}),
          h(PLRow,{label:'TOTAL OWNER DIRECT EXPENSES',vals:totalOwnerExpM,bold:true,color:'#9c27b0'}),
          h('tr',null,h('td',{colSpan:14,style:{height:4}})),
          // PROFIT / LOSS
          h(ProfitRow,{label:sum(plM)>=0?'▲  NET PROFIT':'▼  NET LOSS',vals:plM})))),
    h('div',{style:{marginTop:8,fontSize:11,color:T.textSub,fontFamily:font}},
      '* Months marked with * have no statement uploaded. Net Profit = Owner Payout − Owner Direct Expenses.'));
};

// ── Trend Analysis ─────────────────────────────────────────────────────────────
const TrendPage = ({yearData}) => {
  const YEARS=Object.keys(yearData).map(Number).sort();
  const YEAR_COLORS=Object.fromEntries(YEARS.map((yr,i)=>[yr,YEAR_COLOR_PALETTE[i%YEAR_COLOR_PALETTE.length]]));
  const EXP_CATS=['PM Monthly Service Fee','Maintenance & Construction','Pest Control','Landscaping',
    'Supplies – Household & Property','Supplies – Propane','Linen Service & Cleaning','Owner Stay – Cleaning Fee'];
  const CAT_COLORS=['#2a5fc4','#0d7d6b','#b93232','#c47a0a','#7c3d8f','#1a8a9a','#d4622a','#5a6282'];

  const yearlyTotals=YEARS.map(yr=>{
    const stmts=Object.values(yearData[yr]?.statements||{}).filter(Boolean);
    const rev=stmts.reduce((s,m)=>s+(m.rentalRevenue||0),0);
    const pm=stmts.reduce((s,m)=>s+(m.pmCommission||0),0);
    const payout=stmts.reduce((s,m)=>s+(m.ownerPayout||0),0);
    const allExp=stmts.flatMap(m=>m.expenses||[]);
    const totalExp=allExp.reduce((s,e)=>s+(e.amount||0),0);
    const netIncome=payout+totalExp;
    const expByCat={};
    EXP_CATS.forEach(cat=>{expByCat[cat]=allExp.filter(e=>catExpense(e.description)===cat).reduce((s,e)=>s+(e.amount||0),0);});
    return {year:yr,rev,pm,payout,totalExp,netIncome,expByCat,hasData:stmts.length>0};
  });

  const monthlyRev=YEARS.map(yr=>{
    const stmts=yearData[yr]?.statements||{};
    return {year:yr,months:Array.from({length:12},(_,i)=>stmts[i+1]?.rentalRevenue||0)};
  });

  const hasAny=yearlyTotals.some(y=>y.hasData);
  if(!hasAny) return h('div',null,
    h(SectionHeader,{title:'Trend Analysis',sub:'Multi-year income and expense trends'}),
    h('div',{style:{textAlign:'center',padding:'60px 24px',color:T.textSub,fontFamily:font,fontSize:13,
      background:T.gray0,borderRadius:10,border:'1px solid '+T.border}},
      h('div',{style:{fontSize:32,marginBottom:12}},'📈'),
      h('div',{style:{fontWeight:600,marginBottom:6}},'No data yet'),
      h('div',null,'Upload owner statements for multiple years to see trends')));

  const nYears=YEARS.length;
  const yLbl=n=>n>=1000?'$'+(n/1000).toFixed(0)+'k':fmt$(n);

  const YoY=({curr,prev})=>{
    if(prev==null||curr==null||prev===0)return null;
    const pct=(curr-prev)/Math.abs(prev)*100;
    const up=pct>=0;
    return h('span',{style:{fontSize:10,fontWeight:600,color:up?T.green:T.red,
      background:up?T.greenLight:T.redLight,padding:'2px 7px',borderRadius:10,marginLeft:6,whiteSpace:'nowrap'}},
      (up?'▲ +':'▼ ')+Math.abs(pct).toFixed(1)+'%');
  };

  const Card=({children,style:st={}})=>h('div',{style:{background:T.white,border:'1px solid '+T.border,borderRadius:12,padding:'24px 28px',...st}},children);
  const ChartTitle=({title,sub})=>h('div',{style:{marginBottom:16}},
    h('div',{style:{fontSize:14,fontWeight:700,color:T.text,fontFamily:font}},title),
    sub&&h('div',{style:{fontSize:11,color:T.textSub,fontFamily:font,marginTop:2}},sub));
  const Legend=({items})=>h('div',{style:{display:'flex',gap:20,flexWrap:'wrap',marginBottom:14}},
    items.map(({label,color})=>h('div',{key:label,style:{display:'flex',alignItems:'center',gap:7,fontSize:12,color:T.text,fontFamily:font}},
      h('div',{style:{width:12,height:12,borderRadius:3,background:color,flexShrink:0}}),label)));

  const W=600,H=180,PL=64,PR=16,PT=16,PB=28;
  const chartW=W-PL-PR,chartH=H-PT-PB;
  const groupW=chartW/nYears;
  const barW=Math.min(50,groupW*0.55);
  const dualBarW=Math.min(22,groupW*0.25);
  const groupX=i=>PL+i*groupW+groupW/2;
  const toY=(v,max)=>PT+chartH-Math.max(3,(v/Math.max(max,1))*chartH);
  const barHt=(v,max)=>Math.max(3,(v/Math.max(max,1))*chartH);

    [0,0.25,0.5,0.75,1].map(f=>h('g',{key:f},
